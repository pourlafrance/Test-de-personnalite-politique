<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 3 2'%3E%3Crect width='1' height='2' fill='%23002395'/%3E%3Crect x='1' width='1' height='2' fill='%23fff'/%3E%3Crect x='2' width='1' height='2' fill='%23ED2939'/%3E%3C/svg%3E">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test politique 2017</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}

/* ─── LIGHT MODE (default) ─── */
:root{
  --bg:#f0f4fb;
  --card:#ffffff;
  --cb:#d0daea;
  --c2:#e8eef8;
  --t1:#0f1f3d;
  --t2:#1e3560;
  --t3:#4a6080;
  --t4:#8a9ab8;
  --ch:#dce8f8;
  --ct:#2a5298;
  --pb:#b8cce8;
  --pri:#2563eb;
  --pri2:#1d4ed8;
  --priL:#eff6ff;
  --priB:#bfdbfe;
  --rg:#fef2f2;
  --rt:#dc2626;
  --rb:#fecaca;
  --wg:#fffbeb;
  --wt:#92400e;
  --wb:#fcd34d;
  --gk:#16a34a;
  --gg:#f0fdf4;
  --ig:#eff6ff;
  --it:#2563eb;
  --card-shadow:0 1px 4px rgba(37,99,235,.08), 0 0 0 .5px rgba(37,99,235,.10);
}

/* ─── DARK MODE ─── */
.dk{
  --bg:#0d1117;
  --card:#161b22;
  --cb:#21262d;
  --c2:#0d1117;
  --t1:#e6edf3;
  --t2:#cdd5df;
  --t3:#8b949e;
  --t4:#484f58;
  --ch:#1c2128;
  --ct:#79c0ff;
  --pb:#30363d;
  --pri:#3b82f6;
  --pri2:#2563eb;
  --priL:#0d2045;
  --priB:#1e3a5f;
  --rg:#2a1010;
  --rt:#f87171;
  --rb:#7f1d1d;
  --wg:#221a00;
  --wt:#fcd34d;
  --wb:#92660a;
  --gk:#4ade80;
  --gg:#031a0a;
  --ig:#0d1a35;
  --it:#79c0ff;
  --card-shadow:none;
}

html,body{background:var(--bg);min-height:100%}
#W{background:var(--bg);min-height:100vh;padding:1rem .875rem}
#A{max-width:660px;margin:0 auto}
body,button{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}

.qt{font-size:18px;font-weight:600;line-height:1.55;color:var(--t1);font-family:Georgia,serif}
.bm{font-size:14px;line-height:1.7;color:var(--t2);text-align:justify}
.bs{font-size:13px;line-height:1.6;color:var(--t3)}
.lb{font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;color:var(--t4)}

.card{
  background:var(--card);
  border:.5px solid var(--cb);
  border-radius:16px;
  padding:20px;
  margin-bottom:12px;
  box-shadow:var(--card-shadow);
}
.mc{
  display:flex;align-items:flex-start;gap:13px;padding:16px;
  border:.5px solid var(--cb);border-radius:14px;
  background:var(--card);cursor:pointer;
  transition:border-color .15s,transform .12s,box-shadow .12s;
  margin-bottom:10px;
  box-shadow:var(--card-shadow);
}

.mc.hi{border-color:var(--rb)}
.mi{
  width:44px;height:44px;border-radius:11px;
  background:var(--priL);border:.5px solid var(--priB);
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
}

/* ─── Answer buttons ─── */
.ab{
  width:100%;padding:11px 3px;border-radius:9px;
  border:1.5px solid var(--pb);background:var(--card);
  color:var(--t3);font-size:11px;text-align:center;
  cursor:pointer;line-height:1.35;transition:all .12s;
  font-family:inherit;font-weight:500;
}

.ab.sn2{border:2.5px solid var(--rt);color:var(--rt);font-weight:700;background:var(--rg)}
.ab.sn1{border:2px solid #ea580c;color:#c2410c;font-weight:600;background:#fff7ed}
.dk .ab.sn1{background:#1c0a00;color:#fb923c}
.ab.s0{border:2px solid var(--t1);color:var(--t1);font-weight:600;background:var(--ch)}
.ab.s1{border:2px solid #16a34a;color:#15803d;font-weight:600;background:var(--gg)}
.ab.s2{border:2.5px solid var(--gk);color:var(--gk);font-weight:700;background:var(--gg)}
.ab.sk{border:1.5px solid var(--pb);color:var(--t4);font-style:italic;background:var(--c2)}


/* ─── Context toggle ─── */
.db{
  display:flex;align-items:center;gap:8px;padding:10px 14px;
  border-radius:10px;border:1.5px solid var(--priB);
  background:var(--priL);cursor:pointer;font-size:13px;
  color:var(--pri);margin-bottom:12px;transition:all .12s;
  width:100%;text-align:left;font-family:inherit;font-weight:600;
}
.db:hover{background:var(--ch);border-color:var(--pri)}
.db.on{background:var(--ch);border-color:var(--pri);color:var(--t1)}
.dbox{
  padding:15px;border-radius:11px;
  background:var(--c2);border:.5px solid var(--cb);
  margin-bottom:13px;line-height:1.8;
}

/* ─── Footnotes ─── */
.fn{font-size:11px;color:var(--t4);margin-top:10px;padding-top:8px;border-top:.5px solid var(--cb);line-height:1.6}
.fn a{color:var(--it);text-decoration:none}.fn a:hover{text-decoration:underline}
sup{font-size:9px;vertical-align:super;color:var(--pri);font-weight:700}

/* ─── Progress ─── */
.pb2{height:5px;background:var(--c2);border-radius:3px;overflow:hidden}
.pf{height:100%;background:var(--pri);border-radius:3px;transition:width .4s}

/* ─── Buttons ─── */
.pr{
  padding:11px 24px;background:var(--pri);color:#fff;
  border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;
  transition:background .12s;
}
.pr:hover{background:var(--pri2)}.pr:disabled{opacity:.3;cursor:not-allowed}
.se{
  padding:8px 14px;background:var(--card);color:var(--t2);
  border:1px solid var(--cb);border-radius:9px;font-size:13px;
  cursor:pointer;font-family:inherit;transition:all .12s;
}
.se:hover{background:var(--priL);border-color:var(--priB);color:var(--pri)}
.tb{
  padding:6px 14px;border-radius:8px;
  background:var(--priL);border:1px solid var(--priB);
  color:var(--pri);font-size:12px;cursor:pointer;font-family:inherit;
  font-weight:600;transition:all .12s;
}
.tb:hover{background:var(--ch)}
.hb{
  padding:7px 14px;background:transparent;
  color:var(--t3);border:1px solid var(--cb);
  border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;
  transition:all .12s;
}
.hb:hover{color:var(--pri);border-color:var(--priB);background:var(--priL)}

/* ─── Results ─── */
.sc{background:var(--priL);border:1px solid var(--priB);border-radius:14px;padding:16px;margin-bottom:14px}
.bar{height:9px;background:var(--c2);border-radius:4px;overflow:hidden;margin-top:4px}
.bf{height:100%;border-radius:4px;width:0;transition:width 1.3s cubic-bezier(.22,1,.36,1)}
.cr{border-radius:9px;margin-bottom:6px;border:.5px solid var(--cb);overflow:hidden;background:var(--card)}
.cr.el{border-left:3px solid var(--rt)}.cr.tp{border-left:3px solid #16a34a}
.ch2{display:flex;justify-content:space-between;align-items:center;padding:11px 13px;cursor:pointer;transition:background .1s}
.ch2:hover{background:var(--c2)}.cd{display:none;padding:11px 13px;border-top:.5px solid var(--cb);background:var(--c2)}.cd.op{display:block}
.di{display:flex;gap:6px;padding:3px 0;font-size:12.5px;color:var(--t2);line-height:1.5;align-items:flex-start}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:4px}

/* ─── Chips ─── */
.ct{font-size:11px;padding:2px 9px;border-radius:8px;background:var(--priL);color:var(--pri);font-weight:600;border:.5px solid var(--priB)}
.cr2{font-size:11px;padding:2px 9px;border-radius:8px;background:var(--rg);color:var(--rt);font-weight:600;border:.5px solid var(--rb)}

/* ─── Checkbox ─── */
.cbr{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;padding:4px 0;font-size:14px;color:var(--t2)}
.cbb{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--pb);background:var(--card);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .1s}
.cbb.on{background:var(--pri);border-color:var(--pri)}.cbb.on::after{content:'✓';font-size:9px;color:#fff;font-weight:700}

/* ─── Links ─── */
.sa{color:var(--it);text-decoration:none;font-size:13px}.sa:hover{text-decoration:underline}

/* ─── Civic section ─── */
.cv{
  background:var(--card);
  border-left:4px solid var(--pri);
  border-radius:0 14px 14px 0;
  padding:18px;margin-top:18px;
  box-shadow:var(--card-shadow);
}

/* ─── Code block ─── */
.cbk{border-radius:12px;overflow:hidden}
.ck2{background:#1a2236;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.cb2{background:#0d1117;padding:16px 18px;font-family:"SFMono-Regular","Fira Code",monospace;font-size:12px;color:#9be09a;line-height:1.85;overflow-x:auto}
.cm2{color:#5a7fa0}.kw{color:#c792ea}.fn2{color:#82aaff}.nm{color:#f78c6c}

/* ─── Theme badge ─── */
.edition-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 12px;border-radius:20px;
  background:var(--priL);border:1px solid var(--priB);
  font-size:11px;font-weight:700;color:var(--pri);
  letter-spacing:.05em;text-transform:uppercase;
}

/* ─── Mobile touch fix ─── */
.ab{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
@media(hover:hover){
  .ab:hover{border-color:var(--pri);color:var(--pri);background:var(--priL)}
  .ab.sk:hover{color:var(--t3);font-style:normal;background:var(--ch);border-color:var(--t3)}
  .mc:hover{border-color:var(--pri);transform:translateY(-2px);box-shadow:0 4px 16px rgba(37,99,235,.15)}
}
@media(hover:none){
  .ab:hover{border-color:var(--pb);color:var(--t3);background:var(--card)}
  .ab.sk:hover{color:var(--t4);font-style:italic;background:var(--c2)}
  .mc:hover{border-color:var(--cb);transform:none;box-shadow:var(--card-shadow)}
}
</style>
</head>
<body>
<div id="W"><div id="A"></div></div>
<script>
// ─── DEFAULT IS LIGHT MODE ───
let dk = false;
function applyDk(){document.getElementById('W').className=dk?'dk':'';}
applyDk();
function tT(){dk=!dk;applyDk();R();}

function lbl(type){
  if(type==='pour') return dk
    ?'<span style="font-size:11px;font-weight:700;padding:2px 9px;border-radius:6px;background:#031a0a;color:#4ade80;flex-shrink:0;margin-top:2px;white-space:nowrap">Pour</span>'
    :'<span style="font-size:11px;font-weight:700;padding:2px 9px;border-radius:6px;background:#f0fdf4;color:#15803d;flex-shrink:0;margin-top:2px;white-space:nowrap;border:.5px solid #bbf7d0">Pour</span>';
  return dk
    ?'<span style="font-size:11px;font-weight:700;padding:2px 9px;border-radius:6px;background:#0d1a35;color:#79c0ff;flex-shrink:0;margin-top:2px;white-space:nowrap">Contre</span>'
    :'<span style="font-size:11px;font-weight:700;padding:2px 9px;border-radius:6px;background:#eff6ff;color:#1d4ed8;flex-shrink:0;margin-top:2px;white-space:nowrap;border:.5px solid #bfdbfe">Contre</span>';
}
function argRow(type,text){
  return `<div style="display:flex;gap:8px;margin-bottom:9px;align-items:flex-start">${lbl(type)}<p style="font-size:13.5px;color:var(--t2);line-height:1.7;margin:0">${text}</p></div>`;
}

const TH=["💰 Économie","🌍 Immigration","🔒 Sécurité","🇪🇺 Europe","🌿 Écologie","🏥 Santé & Social","🏛️ Société","🗳️ Démocratie","⚖️ Valeurs","🌐 International","🎓 Éducation","🌾 Agriculture","💻 Numérique"];
const CK=["macron","lepen","fillon","melenchon","hamon","dpa","lassalle","poutou","arthaud"];
const CV={macron:{n:"Emmanuel Macron",p:"En Marche!",c:"#D97706",sx:.30,sy:-.10},lepen:{n:"Marine Le Pen",p:"Front National",c:"#3B82F6",sx:0.75,sy:1.60},fillon:{n:"François Fillon",p:"Les Républicains",c:"#60A5FA",sx:1.10,sy:.60},melenchon:{n:"J.-L. Mélenchon",p:"France Insoumise",c:"#EF4444",sx:-1.85,sy:-.90},hamon:{n:"Benoît Hamon",p:"PS",c:"#EC4899",sx:-.60,sy:-.50},dpa:{n:"N. Dupont-Aignan",p:"Debout la France",c:"#A78BFA",sx:1.25,sy:1.10},lassalle:{n:"Jean Lassalle",p:"Résistons!",c:"#06B6D4",sx:.15,sy:.55},poutou:{n:"Philippe Poutou",p:"NPA",c:"#FB923C",sx:-1.90,sy:-1.60},arthaud:{n:"Nathalie Arthaud",p:"LO",c:"#F43F5E",sx:-1.85,sy:-1.45}};
const SR={eco:[{l:"OFCE – Sciences Po",u:"https://www.ofce.sciences-po.fr"},{l:"France Stratégie",u:"https://www.strategie.gouv.fr"}],imm:[{l:"OFPRA",u:"https://www.ofpra.gouv.fr"},{l:"Vie-publique.fr",u:"https://www.vie-publique.fr"}],sec:[{l:"IHEMI",u:"https://www.ihemi.fr"},{l:"Vie-publique.fr",u:"https://www.vie-publique.fr"}],eu:[{l:"Toute l'Europe",u:"https://www.touteleurope.eu"},{l:"Vie-publique.fr",u:"https://www.vie-publique.fr"}],ecol:[{l:"Haut Conseil pour le Climat",u:"https://www.hautconseilclimat.fr"},{l:"ADEME",u:"https://www.ademe.fr"}],soc:[{l:"DREES",u:"https://drees.solidarites-sante.gouv.fr"},{l:"Cour des Comptes",u:"https://www.ccomptes.fr"}],soc2:[{l:"CCNE",u:"https://www.ccne-ethique.fr"},{l:"Vie-publique.fr",u:"https://www.vie-publique.fr"}],dem:[{l:"CEVIPOF – Sciences Po",u:"https://www.sciencespo.fr/cevipof"},{l:"Conseil Constitutionnel",u:"https://www.conseil-constitutionnel.fr"}],val:[{l:"INSEE",u:"https://www.insee.fr"},{l:"Vie-publique.fr",u:"https://www.vie-publique.fr"}],int:[{l:"IRSEM",u:"https://www.irsem.fr"},{l:"Institut Montaigne",u:"https://www.institutmontaigne.org"}],edu:[{l:"Ministère Éducation – DEPP",u:"https://www.education.gouv.fr"},{l:"Vie-publique.fr",u:"https://www.vie-publique.fr"}],agr:[{l:"INSEE Agreste",u:"https://agreste.agriculture.gouv.fr"},{l:"INRAE",u:"https://www.inrae.fr"}],num:[{l:"CNIL",u:"https://www.cnil.fr"},{l:"Vie-publique.fr",u:"https://www.vie-publique.fr"}]};

const QD=[["L'État doit augmenter les dépenses publiques pour améliorer les services publics, quitte à creuser davantage la dette.","La dette française représentait 96,6\xa0% du PIB en 2016<sup>*</sup> (~\xa02\xa0160\xa0Mds€). Les dépenses publiques financent majoritairement la protection sociale (retraites, aides, chômage), la santé, l'éducation, le fonctionnement de l'État et le remboursement des intérêts de cette dette.","Ses partisans estiment que l'investissement public améliore le niveau de vie, réduit les inégalités et soutient la croissance économique à long terme.",'Ses opposants estiment que la maîtrise de la dette protège les générations futures, préserve la crédibilité financière de la France et laisse des marges de manœuvre en cas de crise.','eco',[['*',"INSEE/Eurostat, Comptes nationaux 2016 — <a href='https://www.insee.fr/fr/statistiques/serie/001558206' target='_blank'>insee.fr</a>"]]],
["L'âge légal de départ à la retraite doit être abaissé à 60 ans pour les carrières longues.","L'âge légal de retraite a été relevé de 60 à 62\xa0ans par la loi du 9\xa0novembre\xa02010<sup>*</sup>. Pénibilité, espérance de vie en bonne santé et financement du système sont au cœur du débat de la campagne 2017.","Ses partisans estiment qu'un départ plus précoce est une juste reconnaissance de la pénibilité de certains métiers et permet aux travailleurs de profiter de leur retraite en bonne santé.","Ses opposants estiment que l'allongement progressif de la durée de cotisation est nécessaire pour assurer la viabilité financière du système et son équité entre générations.",'eco',[['*',"Loi n°\xa02010-1330 du 9\xa0novembre 2010 — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000023022127' target='_blank'>legifrance.gouv.fr</a>"]]],
['Le Salaire Minimum Interprofessionnel de Croissance (SMIC) doit être augmenté significativement.','Le SMIC brut était de 1\xa0480,27\xa0€ au 1er\xa0janvier\xa02017<sup>*</sup>, soit environ 1\xa0153\xa0€ nets. Il concerne directement environ 1,8\xa0million de travailleurs<sup>**</sup>.',"Ses partisans estiment qu'une hausse significative améliore le pouvoir d'achat des ménages les plus modestes et contribue à réduire les inégalités salariales.","Ses opposants estiment qu'une hausse trop rapide peut fragiliser les secteurs à faibles marges et les très petites entreprises, avec un risque de réduction des embauches.",'eco',[['*',"Décret n°\xa02016-1812 du 22\xa0décembre 2016 — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000033686291' target='_blank'>legifrance.gouv.fr</a>"],['**',"DARES, Les bénéficiaires du SMIC 2017 — <a href='https://dares.travail-emploi.gouv.fr' target='_blank'>dares.travail-emploi.gouv.fr</a>"]]],
['Un Impôt sur la Fortune (ISF) doit être maintenu, voire renforcé, pour les très hauts patrimoines.',"L'Impôt de Solidarité sur la Fortune (ISF) est en vigueur en 2017<sup>*</sup>. Il concerne les patrimoines nets supérieurs à 1,3\xa0million d'euros. Plusieurs candidats proposent de le supprimer ou de le réformer.","Ses partisans estiment que l'ISF est un instrument de justice fiscale permettant une meilleure redistribution des richesses et limitant la concentration du patrimoine.","Ses opposants estiment que cet impôt pénalise les entrepreneurs et pousse des capitaux à quitter la France, nuisant à l'investissement et à la compétitivité.",'eco',[['*',"Code général des impôts, art.\xa0885 A — <a href='https://www.legifrance.gouv.fr/codes/id/LEGISCTA000006191734/' target='_blank'>legifrance.gouv.fr</a>"]]],
['Il faut réduire les prélèvements obligatoires pesant sur les entreprises pour favoriser la compétitivité.',"Les prélèvements sur les entreprises françaises comprennent les cotisations sociales patronales et diverses taxes. Leur niveau global est parmi les plus élevés de l'OCDE<sup>*</sup>. Le crédit d'impôt compétitivité emploi (CICE) a été instauré en 2013 pour alléger ce fardeau.","Ses partisans estiment que réduire ces prélèvements améliore la compétitivité des entreprises françaises, allège le coût du travail et favorise les créations d'emplois.","Ses opposants estiment que ce niveau garantit le financement du modèle de protection sociale et de services publics dont bénéficient l'ensemble des salariés et des citoyens.",'eco',[['*',"OCDE, Taxing Wages 2017 — <a href='https://www.oecd.org/fr/publication/taxing-wages-20725124.htm' target='_blank'>oecd.org</a>"]]],
['La France doit protéger ses industries stratégiques de la concurrence internationale.',"La France a perdu environ 2\xa0millions d'emplois industriels entre 1980 et 2015<sup>*</sup>. La désindustrialisation est un thème central de la campagne 2017, notamment pour les territoires sinistrés.","Ses partisans estiment que protéger les secteurs stratégiques préserve l'emploi national, assure une souveraineté économique et évite une dépendance excessive à l'égard de fournisseurs étrangers.","Ses opposants estiment que l'ouverture à la concurrence internationale stimule l'innovation, maintient les prix à la consommation et renforce la compétitivité globale.",'eco',[['*',"INSEE, Tableaux de l'économie française 2017 — <a href='https://www.insee.fr/fr/statistiques/2015691' target='_blank'>insee.fr</a>"]]],
["L'État est trop présent dans la vie économique et doit laisser davantage de place à l'initiative privée.","La France consacre environ 56,7\xa0% de son PIB aux dépenses publiques en 2016<sup>*</sup>, le taux le plus élevé de l'Union européenne.","Ses partisans estiment que réduire le poids de l'État libère l'initiative individuelle, stimule l'entrepreneuriat et améliore l'efficacité économique globale.","Ses opposants estiment que l'intervention de l'État garantit l'accès universel aux services essentiels, réduit les inégalités et assure une protection collective contre les aléas du marché.",'eco',[['*',"Eurostat, Dépenses publiques en % du PIB 2016 — <a href='https://ec.europa.eu/eurostat/databrowser/view/gov_10a_main' target='_blank'>ec.europa.eu</a>"]]],
['Les flux migratoires vers la France doivent être fortement réduits.',"La France a délivré 262\xa0000 premiers titres de séjour en 2016<sup>*</sup>. L'immigration est un thème très présent dans la campagne, notamment avec la question des réfugiés arrivés en Europe depuis 2015.","Ses partisans estiment qu'une politique migratoire plus sélective et mieux contrôlée permet d'assurer une intégration de meilleure qualité et d'adapter les flux aux capacités d'accueil du pays.","Ses opposants estiment que l'immigration contribue à l'économie française, compense les déficits démographiques dans certains secteurs, et que la France a des engagements humanitaires et internationaux qui encadrent la gestion des flux.",'imm',[['*',"Ministère de l'Intérieur, Chiffres de l'immigration 2016 — <a href='https://www.immigration.interieur.gouv.fr' target='_blank'>immigration.interieur.gouv.fr</a>"]]],
['Le droit du sol doit être supprimé ou fortement restreint.',"Le droit du sol permet d'obtenir la nationalité française en étant né sur le territoire de parents étrangers. Il coexiste avec le droit du sang depuis la loi du 26\xa0juin\xa01889<sup>*</sup>. Sa remise en cause est défendue par plusieurs candidats en 2017.","Ses partisans estiment que restreindre le droit du sol permet de mieux conditionner l'attribution de la nationalité à une démarche d'intégration effective et volontaire.","Ses opposants estiment que le droit du sol, inscrit dans la tradition républicaine depuis plus d'un siècle, favorise l'intégration des enfants nés sur le sol national et leur pleine appartenance à la communauté nationale.",'imm',[['*',"Art.\xa019-3 du Code civil — <a href='https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000006419351' target='_blank'>legifrance.gouv.fr</a>"]]],
["L'intégration des personnes immigrées nécessite davantage de moyens publics.","Le taux d'emploi des personnes immigrées est structurellement inférieur d'environ 10 points à la moyenne nationale. L'intégration touche le logement, l'emploi, la langue et l'éducation.","Ses partisans estiment qu'investir dans l'intégration — formation linguistique, accès à l'emploi, accompagnement social — est efficace pour la cohésion nationale et bénéfique économiquement.","Ses opposants estiment que conditionner l'accueil à des critères préalables d'intégration permet de mieux cibler les ressources disponibles et d'assurer une insertion plus durable.",'imm',[]],
['Les peines de prison doivent être significativement alourdies pour les crimes graves.','La France compte environ 68\xa0000 détenus pour 58\xa0000 places disponibles en 2017<sup>*</sup>. Le taux de récidive est estimé à environ 40\xa0% dans les cinq ans suivant la libération<sup>**</sup>.',"Ses partisans estiment que des peines plus sévères ont un effet dissuasif sur les crimes graves et répondent à l'attente de protection de la société et de justice pour les victimes.",'Ses opposants estiment que renforcer les dispositifs de réinsertion est la voie la plus efficace pour réduire durablement la récidive.','sec',[['*',"Ministère de la Justice, Statistiques pénitentiaires 2017 — <a href='https://www.justice.gouv.fr/statistiques.html' target='_blank'>justice.gouv.fr</a>"],['**',"Ministère de la Justice, Chiffres clés de la Justice 2017 — <a href='https://www.justice.gouv.fr/documentation/publications/les-chiffres-cles-de-la-justice' target='_blank'>justice.gouv.fr</a>"]]],
["La France doit recruter davantage de forces de l'ordre.",'La France comptait environ 145\xa0000 policiers nationaux et 98\xa0000 gendarmes en 2017<sup>*</sup>. Le contexte des attentats terroristes de 2015-2016 a relancé le débat sur les effectifs.',"Ses partisans estiment que davantage de forces de l'ordre améliore la présence sur le terrain, renforce le sentiment de sécurité et permet une réponse plus rapide aux infractions.","Ses opposants estiment qu'une approche sociale et préventive est plus efficace pour réduire la délinquance à long terme.",'sec',[['*',"Ministère de l'Intérieur, Rapport annuel de performances 2017 — <a href='https://www.budget.gouv.fr' target='_blank'>budget.gouv.fr</a>"]]],
['La légalisation du cannabis à usage récréatif doit être envisagée.',"Le cannabis est la substance illicite la plus consommée en France — environ 700\xa0000 consommateurs quotidiens selon l'OFDT<sup>*</sup>. La France est l'un des pays où la consommation est la plus répandue en Europe malgré l'interdiction.",'Ses partisans estiment que la légalisation encadrée permet de contrôler la qualité, de réduire les trafics criminels, de dégager des recettes fiscales et de traiter la consommation comme un enjeu de santé publique.',"Ses opposants estiment que maintenir l'interdiction envoie un signal clair sur les risques sanitaires, notamment pour les jeunes, et évite de normaliser l'usage d'une substance psychoactive.",'sec',[['*',"OFDT, Drogues et addictions, données essentielles 2017 — <a href='https://www.ofdt.fr' target='_blank'>ofdt.fr</a>"]]],
["La France doit récupérer des compétences souveraines vis-à-vis de l'Union européenne.","Le Brexit, décidé par référendum en juin\xa02016<sup>*</sup>, a relancé le débat européen dans toute l'UE. En France, plusieurs candidats défendent un « plan B » ou une renégociation des traités. Depuis Maastricht (1992), la France a transféré à l'UE sa politique monétaire, commerciale et ses règles budgétaires.",'Ses partisans estiment que récupérer certaines compétences permettrait à la France de mener des politiques plus adaptées à ses besoins spécifiques et de restaurer un contrôle démocratique direct.',"Ses opposants estiment que ces transferts permettent à la France de peser davantage dans les négociations mondiales et de bénéficier d'un espace économique intégré plus efficace.",'eu',[['*',"Résultat du référendum britannique, 23\xa0juin 2016 — <a href='https://www.touteleurope.eu/fonctionnement-de-l-ue/le-brexit/' target='_blank'>touteleurope.eu</a>"]]],
["L'Union européenne est globalement bénéfique pour la France.","La France est l'un des principaux bénéficiaires des fonds structurels européens. L'UE représente environ 60\xa0% du commerce extérieur français<sup>*</sup>. En 2017, l'UE traverse une crise de légitimité après le Brexit et la montée des partis eurosceptiques.","Ses partisans estiment que l'Union européenne garantit la paix sur le continent, crée des solidarités économiques et renforce le poids de la France dans les négociations mondiales.",'Ses opposants estiment que certaines règles européennes limitent la capacité des États membres à mener des politiques souveraines adaptées à leur situation propre.','eu',[['*',"Douanes françaises, Commerce extérieur de la France 2016 — <a href='https://www.douane.gouv.fr' target='_blank'>douane.gouv.fr</a>"]]],
['La transition écologique doit être une priorité absolue, même si elle implique des efforts économiques importants.',"L'Accord de Paris sur le climat a été signé en décembre\xa02015 et ratifié par la France en 2016<sup>*</sup>. Le GIEC (rapport AR5, 2014<sup>**</sup>) préconisait une réduction significative des émissions. La France s'est engagée à la neutralité carbone à long terme.",'Ses partisans estiment que faire de la transition écologique une priorité absolue est la seule voie pour éviter des catastrophes climatiques dont le coût humain serait bien supérieur aux investissements nécessaires.',"Ses opposants estiment qu'une transition dont le rythme n'est pas adapté aux capacités économiques risque de peser disproportionnellement sur les ménages modestes et d'affaiblir la compétitivité française.",'ecol',[['*',"Loi n°\xa02016-786 du 15\xa0juin 2016 ratifiant l'Accord de Paris — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000032760792' target='_blank'>legifrance.gouv.fr</a>"],['**',"GIEC, Cinquième rapport d'évaluation (AR5), 2014 — <a href='https://www.ipcc.ch/assessment-report/ar5/' target='_blank'>ipcc.ch</a>"]]],
["L'énergie nucléaire doit rester une composante importante du mix énergétique français.","La France a produit environ 72\xa0% de son électricité par fission nucléaire en 2016<sup>*</sup>. La loi de transition énergétique (2015) prévoit de ramener cette part à 50\xa0% d'ici 2025.","Ses partisans estiment que l'énergie nucléaire garantit une électricité peu carbonée, une indépendance énergétique durable et des prix stables.","Ses opposants estiment qu'il faut accélérer la transition vers les énergies renouvelables, en raison des risques d'accident, des défis liés aux déchets radioactifs et du coût du démantèlement.",'ecol',[['*',"RTE, Bilan électrique 2016 — <a href='https://bilan-electrique-2016.rte-france.com/' target='_blank'>rte-france.com</a>"]]],
['Les activités très polluantes doivent être beaucoup plus fortement taxées.','La taxe carbone (contribution climat énergie), instaurée en 2014<sup>*</sup>, augmente progressivement le prix des énergies fossiles. Son niveau en 2017 est de 22\xa0€/tonne de CO₂ — nettement en dessous des 100\xa0€ préconisés par certains économistes.','Ses partisans estiment que taxer plus fortement les activités polluantes incite les entreprises et les ménages à modifier leurs comportements et à investir dans des alternatives moins émettrices.',"Ses opposants estiment que cette forme de taxation peut pénaliser des ménages qui n'ont pas encore accès à des alternatives abordables.",'ecol',[['*',"Loi n°\xa02013-1278 du 29\xa0décembre 2013 de finances pour 2014, art.\xa069 — <a href='https://www.legifrance.gouv.fr' target='_blank'>legifrance.gouv.fr</a>"]]],
['Le système de santé doit rester entièrement public, sans aucune privatisation.',"La Sécurité Sociale couvre environ 77,8\xa0% des dépenses courantes de santé en France en 2015<sup>*</sup>. Des déserts médicaux et des tensions sur l'hôpital public alimentent le débat sur le modèle de santé.","Ses partisans estiment que maintenir un système entièrement public garantit l'égalité d'accès aux soins pour tous les citoyens et préserve le principe de solidarité nationale.","Ses opposants estiment qu'une part de gestion privée peut améliorer l'efficacité organisationnelle, réduire les délais d'attente et moderniser l'offre de soins.",'soc',[['*',"DREES, Comptes de la santé 2016 — <a href='https://drees.solidarites-sante.gouv.fr' target='_blank'>drees.solidarites-sante.gouv.fr</a>"]]],
["Les aides sociales (Revenu de Solidarité Active, allocations) doivent être conditionnées à une démarche active de retour à l'emploi.","Le Revenu de Solidarité Active (RSA) concerne environ 1,8\xa0million de foyers bénéficiaires en 2016<sup>*</sup>, pour un montant mensuel de 535,17\xa0€ pour une personne seule. Son accompagnement vers l'emploi est jugé insuffisant par plusieurs rapports.","Ses partisans estiment que conditionner les aides à une démarche d'insertion active favorise le retour vers l'emploi et accompagne les bénéficiaires dans un parcours de réinsertion.","Ses opposants estiment que les aides sociales doivent soutenir inconditionnellement les personnes en difficulté, dont les obstacles au retour à l'emploi sont souvent structurels.",'soc',[['*',"DREES, Minima sociaux et prestations sociales 2017 — <a href='https://drees.solidarites-sante.gouv.fr' target='_blank'>drees.solidarites-sante.gouv.fr</a>"]]],
["L'État doit construire massivement des logements sociaux pour répondre à la crise du logement.","Environ 1,8\xa0million de ménages sont en attente d'un logement social en 2016<sup>*</sup>. Les prix immobiliers ont fortement augmenté dans les grandes métropoles, rendant difficile l'accès au logement pour les revenus modestes.","Ses partisans estiment que construire massivement des logements sociaux est le moyen le plus direct pour l'État d'assurer un accès au logement digne pour les ménages les plus modestes.","Ses opposants estiment que simplifier les règles d'urbanisme et libérer le marché immobilier permettrait d'augmenter l'offre globale et de faire baisser les prix.",'soc',[['*',"Ministère du Logement, Rapport sur les demandes de logement social 2016 — <a href='https://www.cohesion-territoires.gouv.fr' target='_blank'>cohesion-territoires.gouv.fr</a>"]]],
["Les signes religieux ostensibles doivent être davantage limités dans l'espace public.","La loi du 9\xa0décembre\xa01905<sup>*</sup> pose le principe de séparation de l'Église et de l'État. La loi du 15\xa0mars\xa02004<sup>**</sup> interdit les signes religieux ostentatoires dans les établissements scolaires publics. Le débat sur le voile dans l'espace public et les universités est vif en 2017.","Ses partisans estiment que limiter davantage les signes religieux dans l'espace public renforce la neutralité commune et permet à chaque citoyen d'interagir dans un cadre partagé.","Ses opposants estiment que les règles actuelles offrent un équilibre satisfaisant et que les étendre davantage porterait atteinte à la liberté de conscience et d'expression religieuse.",'soc2',[['*',"Loi du 9\xa0décembre 1905 — <a href='https://www.legifrance.gouv.fr/loda/id/LEGITEXT000006070169' target='_blank'>legifrance.gouv.fr</a>"],['**',"Loi n°\xa02004-228 du 15\xa0mars 2004 — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000000417977' target='_blank'>legifrance.gouv.fr</a>"]]],
['Le droit au mariage doit être ouvert à tous les couples, quelle que soit leur orientation sexuelle.',"Le mariage pour tous a été légalisé en France par la loi du 17\xa0mai\xa02013<sup>*</sup>. En 2017, certains candidats s'engagent à l'abroger, d'autres à l'étendre (PMA, GPA).","Ses partisans estiment que l'égalité des droits doit s'appliquer à tous les couples sans distinction, et que le droit au mariage est un droit fondamental.","Ses opposants estiment que le mariage correspond à une institution fondée sur la complémentarité des sexes et que d'autres formes de reconnaissance juridique pourraient répondre aux besoins des couples de même sexe.",'soc2',[['*',"Loi n°\xa02013-404 du 17\xa0mai 2013 — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000027414540' target='_blank'>legifrance.gouv.fr</a>"]]],
["Les traditions culturelles établies méritent d'être préservées face aux changements sociaux rapides.","Les sociétés contemporaines connaissent des transformations rapides : modes de vie, structures familiales, repères culturels et valeurs. Ce rythme de changement fait lui-même l'objet d'un débat central dans la campagne 2017.",'Ses partisans estiment que préserver les traditions culturelles assure la continuité sociale, protège les identités collectives et maintient un cadre de sens partagé entre les générations.','Ses opposants estiment que les évolutions sociales reflètent une adaptation naturelle des valeurs et que la société doit pouvoir se transformer pour mieux répondre aux besoins de ses membres.','val',[]],
['Le recours au référendum doit être généralisé pour les grandes décisions politiques nationales.',"Le référendum est prévu par l'article\xa011 de la Constitution<sup>*</sup>. Le dernier référendum en France date de 2005 (rejeté). En 2017, le Brexit — décidé par référendum — relance le débat sur la démocratie directe.",'Ses partisans estiment que le recours plus fréquent au référendum renforce la démocratie directe et redonne du sens à la participation politique des citoyens.','Ses opposants estiment que les décisions complexes requièrent un débat approfondi confié à des représentants élus.','dem',[['*',"Constitution du 4\xa0octobre 1958, art.\xa011 — <a href='https://www.conseil-constitutionnel.fr' target='_blank'>conseil-constitutionnel.fr</a>"]]],
['Les institutions de la Ve République doivent être profondément réformées ou remplacées par une 6e République.',"La Ve\xa0République, fondée en 1958<sup>*</sup>, est un régime semi-présidentiel. En 2017, la défiance envers les institutions est forte (taux d'abstention record aux législatives de 2017). La réforme constitutionnelle est au cœur du programme de plusieurs candidats.","Ses partisans estiment qu'une réforme profonde des institutions renforcerait la légitimité démocratique des décisions collectives.",'Ses opposants estiment que la Ve\xa0République assure une stabilité gouvernementale nécessaire et évite les crises institutionnelles.','dem',[['*',"Constitution du 4\xa0octobre 1958 — <a href='https://www.conseil-constitutionnel.fr' target='_blank'>conseil-constitutionnel.fr</a>"]]],
["La liberté individuelle doit primer sur les politiques collectives d'égalisation des conditions de vie.","Le débat entre liberté individuelle et égalité des conditions traverse toute la philosophie politique. Ces deux valeurs sont inscrites dans la Déclaration des droits de l'homme et du citoyen de 1789<sup>*</sup>.",'Ses partisans estiment que la liberté individuelle est le moteur de la prospérité collective.','Ses opposants estiment que des politiques actives de redistribution sont nécessaires pour que la liberté formelle soit réelle pour tous.','val',[['*',"DDHC du 26\xa0août 1789, art.\xa01 et 4 — <a href='https://www.conseil-constitutionnel.fr' target='_blank'>conseil-constitutionnel.fr</a>"]]],
['Les inégalités économiques constituent le problème le plus urgent à résoudre en France.','Les 10\xa0% des ménages les plus riches détiennent environ 47\xa0% du patrimoine total en France en 2015<sup>*</sup>. Les inégalités de patrimoine sont nettement plus fortes que les inégalités de revenus.',"Ses partisans estiment que réduire les inégalités économiques est urgent pour des raisons de cohésion sociale, d'égalité des chances et de fonctionnement démocratique.","Ses opposants estiment que d'autres priorités méritent une attention au moins égale, et que l'amélioration du niveau de vie de tous passe d'abord par des politiques d'accès à l'emploi et à la formation.",'val',[['*',"INSEE, Les inégalités de patrimoine s'accroissent entre 2004 et 2015 — <a href='https://www.insee.fr' target='_blank'>insee.fr</a>"]]],
['Un changement social profond est nécessaire et urgent en France.','La France connaît en 2017 une défiance profonde envers ses élites politiques et économiques. Le vote Front National et la montée des mouvements « antisystème » illustrent une demande de rupture dans une partie de la population.',"Ses partisans estiment qu'un changement social profond et rapide est nécessaire pour répondre aux urgences — inégalités, chômage, déficit démocratique.",'Ses opposants estiment que les réformes progressives et négociées permettent une adaptation maîtrisée de la société et évitent les ruptures dont les effets sont souvent imprévisibles.','val',[]],
['La France doit augmenter significativement son budget de défense nationale.',"La France a consacré 1,78\xa0% de son PIB à la défense en 2016<sup>*</sup>, en dessous de l'objectif OTAN de 2\xa0%. Le contexte des attentats (2015-2016) et des tensions géopolitiques (Ukraine, Syrie) place la défense au cœur du débat.","Ses partisans estiment qu'augmenter le budget de la défense est nécessaire pour assurer la souveraineté nationale et honorer les engagements envers les alliés.",'Ses opposants estiment que les ressources publiques devraient être prioritairement orientées vers les besoins sociaux et les instruments diplomatiques de prévention des conflits.','int',[['*',"Ministère des Armées, Rapport au Parlement sur les exportations d'armement 2017 — <a href='https://www.defense.gouv.fr' target='_blank'>defense.gouv.fr</a>"]]],
['La mondialisation économique a plutôt été néfaste pour les travailleurs français.',"La part de l'industrie dans l'emploi français est passée de 22\xa0% en 1990 à 15\xa0% en 2015<sup>*</sup>. En 2017, les fermetures d'usines et les délocalisations sont des thèmes électoraux majeurs.","Ses partisans estiment que la mondialisation a contribué aux délocalisations, à la perte d'emplois industriels dans des territoires entiers, et a affaibli le pouvoir de négociation des travailleurs.","Ses opposants estiment que l'ouverture économique mondiale a profité aux consommateurs via des prix plus bas et a créé des débouchés à l'export pour les entreprises compétitives.",'int',[['*',"INSEE, Tableaux de l'économie française 2017 — <a href='https://www.insee.fr/fr/statistiques/2015691' target='_blank'>insee.fr</a>"]]],
["L'enseignement privé doit recevoir moins de financement public que l'enseignement public.","L'enseignement privé sous contrat accueille environ 17\xa0% des élèves français<sup>*</sup>. Il bénéficie de financements publics en contrepartie du respect des programmes nationaux.","Ses partisans estiment que réduire ces financements concentrerait davantage les ressources sur l'école publique et renforcerait son rôle d'égalisation des chances.","Ses opposants estiment que la liberté de l'enseignement est un principe reconnu par la loi Debré<sup>**</sup> et que ce financement est une contrepartie légitime.",'edu',[['*',"DEPP, L'état de l'École 2017 — <a href='https://www.education.gouv.fr' target='_blank'>education.gouv.fr</a>"],['**',"Loi n°\xa059-1557 du 31\xa0décembre 1959 — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000000693736' target='_blank'>legifrance.gouv.fr</a>"]]],
["L'école doit davantage valoriser la discipline, l'effort et l'autorité des enseignants.","Les débats pédagogiques portent sur la manière d'enseigner, les méthodes et les finalités de l'école. En 2017, les résultats français aux enquêtes PISA (dernière : 2015<sup>*</sup>) alimentent les critiques sur le système éducatif.","Ses partisans estiment que valoriser davantage la discipline et l'autorité de l'enseignant permet de mieux transmettre les savoirs fondamentaux.","Ses opposants estiment que les approches fondées sur l'épanouissement personnel et l'autonomie permettent aux élèves de développer leur esprit critique.",'edu',[['*',"PISA 2015, OCDE — <a href='https://www.oecd.org/pisa/pisa-2015-results.htm' target='_blank'>oecd.org</a>"]]],
["Les agriculteurs français doivent être davantage protégés et soutenus financièrement par l'État.","Le revenu agricole moyen est d'environ 15\xa0000\xa0€ par an en 2016<sup>*</sup>, avec de très fortes disparités. La crise agricole (prix lait, porc, élevage) est un sujet majeur de la campagne 2017.",'Ses partisans estiment que soutenir les agriculteurs est nécessaire pour assurer la souveraineté alimentaire et maintenir un tissu rural vivant.','Ses opposants estiment que des réformes structurelles permettraient aux agriculteurs de dégager des revenus plus durables.','agr',[['*',"INSEE Agreste, Résultats économiques de l'agriculture 2016 — <a href='https://agreste.agriculture.gouv.fr' target='_blank'>agreste.agriculture.gouv.fr</a>"]]],
['Les grandes plateformes numériques (Google, Amazon, Facebook…) doivent être beaucoup plus strictement régulées.',"En 2017, les GAFA (Google, Apple, Facebook, Amazon) sont au cœur du débat sur la fiscalité, la concurrence et la protection des données. Le RGPD a été adopté en avril\xa02016<sup>*</sup> mais n'entre en vigueur qu'en mai\xa02018.","Ses partisans estiment qu'une régulation plus stricte est nécessaire pour protéger les données personnelles, combattre les monopoles et assurer une fiscalité équitable.","Ses opposants estiment qu'une régulation excessive risque de freiner l'innovation et que les cadres réglementaires en cours de déploiement méritent d'abord d'être bien appliqués.",'num',[['*',"Règlement (UE) 2016/679 du 27\xa0avril 2016 (RGPD, en vigueur mai 2018) — <a href='https://eur-lex.europa.eu/legal-content/FR/TXT/?uri=CELEX%3A32016R0679' target='_blank'>eur-lex.europa.eu</a>"]]],
['La fiscalité des revenus du capital doit être alignée sur celle des revenus du travail (imposition progressive).',"En 2017, les revenus du capital (dividendes, plus-values) peuvent être soumis au barème progressif ou à des prélèvements forfaitaires. Plusieurs candidats proposent de créer une flat tax (taux unique), tandis que d'autres souhaitent aligner la fiscalité du capital sur celle du travail.","Ses partisans estiment qu'une imposition progressive des revenus du capital rétablit l'équité fiscale en traitant revenus du capital et du travail selon les mêmes principes.","Ses opposants estiment qu'un taux forfaitaire simplifie la fiscalité de l'épargne, encourage l'investissement dans les entreprises françaises et stabilise des capitaux en France.",'eco',[]],
['Un revenu universel de base doit être instauré pour tous les citoyens adultes.',"Le revenu universel est au cœur du programme de Benoît Hamon en 2017. Une expérience finlandaise est en cours (2017-2018). En France, le coût d'une telle mesure serait estimé à plusieurs centaines de milliards d'euros selon France Stratégie<sup>*</sup>.","Ses partisans estiment qu'un revenu universel de base garantirait à chacun un filet de sécurité, simplifierait le système d'aides sociales et permettrait à chacun de se former ou de créer.","Ses opposants estiment qu'à ce niveau de coût, le financement imposerait une fiscalité très lourde, et que les effets sur l'incitation au travail restent à démontrer.",'eco',[['*',"France Stratégie, Le revenu universel, de l'utopie au débat, 2017 — <a href='https://www.strategie.gouv.fr/publications/revenu-universel-lutopie-au-debat' target='_blank'>strategie.gouv.fr</a>"]]],
['La semaine de travail doit être réduite à 32 heures sans perte de salaire.',"La France applique les 35\xa0heures depuis 2000<sup>*</sup>. La durée effective du travail est d'environ 1\xa0500\xa0h/an selon l'OCDE<sup>**</sup>. La loi Travail (El Khomri, 2016) a assoupli certaines dispositions, suscitant de vives contestations.",'Ses partisans estiment que passer à 32\xa0heures améliorerait la qualité de vie des travailleurs et permettrait de mieux partager le travail disponible.',"Ses opposants estiment qu'une réduction du temps de travail sans perte de salaire représente un coût important pour les entreprises et risque de nuire à la compétitivité.",'eco',[['*',"Loi n°\xa02000-37 du 19\xa0janvier 2000 — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000000759563' target='_blank'>legifrance.gouv.fr</a>"],['**',"OCDE, Employment Outlook 2017 — <a href='https://stats.oecd.org/Index.aspx?DataSetCode=ANHRS' target='_blank'>stats.oecd.org</a>"]]],
['Les industries énergétiques et les transports doivent être nationalisés ou renationalisés.',"EDF est partiellement privatisée depuis 2005<sup>*</sup> (l'État en détient ~83\xa0%). La SNCF est un établissement public mais son statut évolue. Plusieurs candidats proposent de nationaliser ou de renforcer le contrôle public de ces secteurs.","Ses partisans estiment que la nationalisation garantit un service universel, maintient des tarifs accessibles et place l'intérêt général au-dessus de la rentabilité financière.","Ses opposants estiment que la gestion privée ou mixte favorise l'efficacité opérationnelle et l'innovation.",'eco',[['*',"Loi n°\xa02004-803 du 9\xa0août 2004 relative au service public de l'électricité (ouverture du capital EDF) — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000000794387' target='_blank'>legifrance.gouv.fr</a>"]]],
['Les personnes sans-papiers résidant depuis plus de 5 ans en France doivent pouvoir être régularisées.','Selon des estimations, entre 300\xa0000 et 400\xa0000 personnes seraient en situation irrégulière en France en 2017<sup>*</sup>. Certaines y résident depuis de nombreuses années.','Ses partisans estiment que régulariser les personnes établies depuis longtemps reconnaît leur réalité sociale et met fin à leur précarité juridique.',"Ses opposants estiment que la régularisation doit rester exceptionnelle et pourrait encourager l'immigration irrégulière.",'imm',[['*',"Sénat, rapport sur l'immigration irrégulière, 2016 — <a href='https://www.senat.fr' target='_blank'>senat.fr</a>"]]],
["La politique d'asile doit être durcie avec des délais d'instruction raccourcis.","La France a instruit environ 85\xa0000 premières demandes d'asile en 2016<sup>*</sup>, avec un taux d'accord global d'environ 25\xa0%. La crise des réfugiés de 2015-2016 (plus d'un million d'arrivées en Europe) a intensifié le débat.","Ses partisans estiment que raccourcir les délais permet de statuer plus rapidement et de favoriser l'intégration rapide des personnes dont la demande est acceptée.",'Ses opposants estiment que des délais suffisants sont nécessaires pour un examen rigoureux et équitable de chaque dossier.','imm',[['*',"OFPRA, Rapport d'activité 2016 — <a href='https://www.ofpra.gouv.fr' target='_blank'>ofpra.gouv.fr</a>"]]],
['Des peines minimales obligatoires doivent être rétablies pour les délits en récidive.','Les peines minimales obligatoires ont existé en France entre 2007 et 2014<sup>*</sup>. Leur suppression par la loi du 15\xa0août\xa02014 est contestée par plusieurs candidats en 2017.','Ses partisans estiment que rétablir des peines minimales garantit une réponse pénale prévisible et ferme face à la récidive.',"Ses opposants estiment que les peines minimales restreignent le pouvoir d'appréciation des magistrats, les mieux placés pour adapter la sanction.",'sec',[['*',"Loi n°\xa02007-1198 du 10\xa0août 2007 ; abrogée par la loi n°\xa02014-896 du 15\xa0août 2014 — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000017356245' target='_blank'>legifrance.gouv.fr</a>"]]],
['La France devrait sortir de la zone euro ou en renégocier fondamentalement les règles.',"L'euro a été introduit en 1999. La zone euro compte 19\xa0États membres en 2017<sup>*</sup>. Après la crise grecque (2015) et le Brexit (2016), plusieurs candidats défendent un retour à la souveraineté monétaire — notamment Marine Le Pen (sortie) et Jean-Luc Mélenchon (plan A/plan B).",'Ses partisans estiment que sortir de la zone euro ou en renégocier les règles permettrait à la France de retrouver des outils de politique économique adaptés à sa situation nationale.',"Ses opposants estiment que l'euro garantit la stabilité monétaire, protège contre les spéculations sur la dette et facilite les échanges avec nos partenaires.",'eu',[['*',"BCE, Rapport annuel 2016 — <a href='https://www.ecb.europa.eu' target='_blank'>ecb.europa.eu</a>"]]],
["Les pesticides de synthèse doivent être fortement réduits dans l'agriculture française.","La France est le premier consommateur européen de pesticides de synthèse en valeur en 2015<sup>*</sup>. Le plan Ecophyto, lancé en 2008, vise à réduire l'usage des pesticides mais peine à atteindre ses objectifs.",'Ses partisans estiment que réduire fortement les pesticides est nécessaire pour préserver les écosystèmes, protéger la santé des agriculteurs et des riverains.',"Ses opposants estiment qu'une réduction trop rapide met en danger la compétitivité des exploitations françaises face à des concurrents étrangers moins contraints.",'ecol',[['*',"Eurostat, Statistics on the use of plant protection products — <a href='https://ec.europa.eu/eurostat' target='_blank'>ec.europa.eu</a>"]]],
['La France doit accélérer fortement la transition vers les véhicules moins polluants.','En 2017, les véhicules diesel représentent encore plus de 50\xa0% du parc automobile français<sup>*</sup>. Le scandale Volkswagen (2015) et la pollution urbaine alimentent le débat sur la transition automobile.',"Ses partisans estiment qu'accélérer la transition vers des véhicules moins polluants réduit les émissions, améliore la qualité de l'air et place l'industrie française sur les marchés d'avenir.","Ses opposants estiment qu'une transition trop rapide menace des emplois dans la filière automobile et que le calendrier doit être adapté à la capacité réelle de l'industrie et des consommateurs.",'ecol',[['*',"SDES, Parc automobile au 1er janvier 2017 — <a href='https://www.statistiques.developpement-durable.gouv.fr' target='_blank'>statistiques.developpement-durable.gouv.fr</a>"]]],
['La chasse doit être plus strictement réglementée pour mieux protéger la biodiversité.',"La chasse est pratiquée par environ 1,2\xa0million de titulaires d'un permis de chasse en France en 2016-2017<sup>*</sup>. La question de sa pratique le dimanche et la protection de certaines espèces font débat.","Ses partisans estiment qu'une réglementation plus stricte est nécessaire pour mieux protéger la biodiversité et améliorer la coexistence avec les autres usagers de la nature.",'Ses opposants estiment que la chasse est une pratique culturelle ancrée dans les territoires ruraux, contribuant à la régulation naturelle de certaines espèces.','ecol',[['*',"Fédération Nationale des Chasseurs, Bilan 2016-2017 — <a href='https://www.chasseurdefrance.com' target='_blank'>chasseurdefrance.com</a>"]]],
["L'euthanasie active doit être légalisée en France pour les malades en fin de vie.","La loi Claeys-Leonetti du 2\xa0février\xa02016<sup>*</sup> autorise la sédation profonde et continue pour les malades en fin de vie, mais pas l'injection létale à la demande du patient. L'euthanasie active est légale en Belgique et aux Pays-Bas.","Ses partisans estiment que légaliser l'euthanasie active respecte l'autonomie de la personne et lui permet de choisir les conditions de sa mort dans la dignité.","Ses opposants estiment que la vie humaine mérite d'être protégée jusqu'à son terme naturel et que les soins palliatifs méritent d'être davantage développés.",'soc2',[['*',"Loi n°\xa02016-87 du 2\xa0février 2016 — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000031970253' target='_blank'>legifrance.gouv.fr</a>"]]],
['La prise en charge de la dépendance des personnes âgées doit être intégralement couverte par la Sécurité Sociale.',"Environ 1,3\xa0million de personnes âgées sont bénéficiaires de l'Allocation Personnalisée d'Autonomie (APA) en 2016<sup>*</sup>. Le reste à charge en EHPAD peut dépasser 2\xa0000\xa0€/mois, souvent supérieur aux pensions de retraite.",'Ses partisans estiment que la prise en charge universelle par la Sécurité Sociale garantit que toute personne puisse être accompagnée dignement dans la dépendance sans peser sur sa famille.',"Ses opposants estiment qu'une couverture intégrale représenterait un coût considérable et qu'une combinaison d'aide publique ciblée et d'assurance privée serait plus soutenable.",'soc',[['*',"DREES, L'allocation personnalisée d'autonomie 2016 — <a href='https://drees.solidarites-sante.gouv.fr' target='_blank'>drees.solidarites-sante.gouv.fr</a>"]]],
["L'encadrement des loyers doit être généralisé dans toutes les grandes villes françaises.","L'encadrement des loyers a été instauré à Paris par la loi ALUR de mars\xa02014<sup>*</sup>. Suspendu par le tribunal administratif en 2017, il est au cœur des débats sur le logement en Île-de-France.","Ses partisans estiment que l'encadrement des loyers protège les locataires contre des hausses excessives et permet à des ménages modestes de se maintenir dans les centres urbains.","Ses opposants estiment que plafonner les loyers peut décourager les propriétaires de louer, réduisant l'offre locative disponible.",'soc',[['*',"Loi n°\xa02014-366 du 24\xa0mars 2014 (ALUR) — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000028772256' target='_blank'>legifrance.gouv.fr</a>"]]],
['La Procréation Médicalement Assistée (PMA) doit être ouverte à toutes les femmes, y compris les femmes célibataires.','En 2017, la PMA est réservée aux couples hétérosexuels infertiles. Son extension aux couples de femmes et aux femmes seules est en débat, portée notamment par Benoît Hamon et Yannick Jadot.',"Ses partisans estiment que l'extension de la PMA à toutes les femmes est une question d'égalité des droits : le désir d'enfant ne devrait pas dépendre de l'orientation sexuelle ou de la situation familiale.","Ses opposants estiment que cette extension soulève des questions sur les droits de l'enfant à connaître ses origines et sur les limites souhaitables à la médicalisation de la reproduction.",'soc2',[]],
['La Gestation Pour Autrui (GPA) doit rester totalement interdite en France.',"La GPA est interdite en France par l'article\xa016-7 du Code civil<sup>*</sup>. En 2017, certains candidats proposent de légaliser une GPA éthique encadrée, tandis que d'autres s'y opposent fermement.","Ses partisans estiment que la GPA porte atteinte à la dignité de la femme en faisant de la grossesse l'objet d'un contrat et risque d'ouvrir la voie à des formes de marchandisation du corps humain.","Ses opposants estiment qu'une GPA encadrée, éthique et non commerciale pourrait répondre à des désirs de parentalité légitimes dans un cadre juridique protecteur.",'soc2',[['*',"Code civil, art.\xa016-7 — <a href='https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000006419331' target='_blank'>legifrance.gouv.fr</a>"]]],
['La représentation proportionnelle doit être introduite aux élections législatives.','Le scrutin uninominal majoritaire à deux tours est en vigueur depuis 1958. La proportionnelle a été utilisée une seule fois, aux législatives de 1986<sup>*</sup>. En 2017, plusieurs candidats (Mélenchon, Le Pen, Hamon) la défendent.','Ses partisans estiment que la proportionnelle garantit une représentation plus fidèle de la diversité des opinions et réduit le phénomène de vote utile.','Ses opposants estiment que la proportionnelle intégrale conduit à des assemblées fragmentées et complique la formation de majorités stables.','dem',[['*',"Loi n°\xa086-825 du 11\xa0juillet 1986 (scrutin proportionnel pour 1986) — <a href='https://www.legifrance.gouv.fr' target='_blank'>legifrance.gouv.fr</a>"]]],
['Le nombre de mandats successifs des élus doit être limité dans le temps.',"En France, le non-cumul des mandats simultanés a été instauré par la loi du 14\xa0février\xa02014<sup>*</sup>, applicable depuis les élections de 2017. Il n'existe pas de limitation du nombre de mandats successifs.",'Ses partisans estiment que limiter les mandats successifs favorise le renouvellement des élus, ouvre la politique à de nouveaux profils et contribue à prévenir les risques de clientélisme.',"Ses opposants estiment que l'expérience acquise par un élu dans la durée est un atout pour l'efficacité de son action.",'dem',[['*',"Loi organique n°\xa02014-125 du 14\xa0février 2014 — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000028601264' target='_blank'>legifrance.gouv.fr</a>"]]],
['La discrimination positive par quotas est un outil légitime pour corriger les inégalités structurelles.',"En France, le principe d'égalité formelle devant la loi (art.\xa01 de la Constitution<sup>*</sup>) s'oppose traditionnellement à une approche par quotas ethniques ou sociaux. La parité femmes/hommes en politique constitue une exception à ce principe.","Ses partisans estiment que la discrimination positive est un outil pragmatique pour corriger des inégalités réelles que l'égalité formelle seule ne suffit pas à combler.","Ses opposants estiment que le principe républicain d'universalité — traiter tous les citoyens de manière identique — est le fondement d'une société juste.",'val',[['*',"Constitution du 4\xa0octobre 1958, art.\xa01 — <a href='https://www.conseil-constitutionnel.fr' target='_blank'>conseil-constitutionnel.fr</a>"]]],
["La France doit rester dans le commandement intégré de l'Organisation du Traité de l'Atlantique Nord (OTAN).","La France a réintégré le commandement militaire intégré de l'OTAN en 2009<sup>*</sup>. En 2017, les tensions avec la Russie (Ukraine, Syrie) et l'incertitude sur l'engagement américain (Trump) relancent le débat.","Ses partisans estiment que rester dans le commandement intégré de l'OTAN renforce la sécurité collective et contribue à la dissuasion face aux menaces extérieures.","Ses opposants estiment que la France devrait retrouver une doctrine de défense pleinement autonome, à l'image de la politique gaulliste.",'int',[['*',"Sommet OTAN Strasbourg/Kehl, 4\xa0avril 2009 — <a href='https://www.nato.int' target='_blank'>nato.int</a>"]]],
["L'aide publique au développement doit être portée à 0,7 % du Revenu National Brut (RNB), conformément à l'objectif de l'ONU.","La France a consacré 0,38\xa0% de son RNB à l'aide publique au développement en 2016<sup>*</sup>, en dessous de l'objectif de 0,7\xa0% fixé par l'ONU depuis 1970.","Ses partisans estiment que porter l'aide à 0,7\xa0% du RNB est une expression de la solidarité internationale et participe à la prévention des crises migratoires et sécuritaires.","Ses opposants estiment que les ressources publiques doivent d'abord répondre aux besoins intérieurs et que l'efficacité réelle de l'aide mérite d'être évaluée avant d'en augmenter le volume.",'int',[['*',"OCDE, Statistiques CAD 2016 — <a href='https://www.oecd.org/fr/cad/statistiques/' target='_blank'>oecd.org</a>"]]],
["L'uniforme scolaire doit être rendu obligatoire dans les établissements publics français.","L'uniforme scolaire est quasi absent des établissements publics français, contrairement au Royaume-Uni ou à de nombreux pays. Des expérimentations ponctuelles ont eu lieu dans quelques établissements français sans généralisation.","Ses partisans estiment que l'uniforme réduit les inégalités vestimentaires entre élèves et renforce le sentiment d'appartenance à la communauté scolaire.","Ses opposants estiment que l'uniforme limite la liberté d'expression des jeunes et que les inégalités à l'école appellent des réponses pédagogiques.",'edu',[]],
['Un service civique obligatoire doit être instauré pour tous les jeunes Français.','Le service militaire obligatoire a été suspendu en 1997<sup>*</sup>. Le service civique volontaire a été renforcé depuis 2010. En 2017, plusieurs candidats proposent un service obligatoire universel.',"Ses partisans estiment qu'un service civique obligatoire renforcerait la cohésion nationale, transmettrait des valeurs civiques communes et créerait des liens entre des personnes d'origines très différentes.","Ses opposants estiment qu'un service obligatoire représenterait un coût logistique et financier considérable et retarderait l'entrée dans la vie active.",'edu',[['*',"Loi n°\xa097-1019 du 28\xa0octobre 1997 — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000000563041' target='_blank'>legifrance.gouv.fr</a>"]]],
['Les normes environnementales imposées aux agriculteurs français doivent être allégées pour rester compétitifs.','Les normes environnementales françaises sont souvent plus strictes que celles des pays tiers dont les produits sont importés. La concurrence déloyale est un grief récurrent des syndicats agricoles en 2017<sup>*</sup>.',"Ses partisans estiment qu'alléger certaines normes permettrait de rétablir une concurrence plus équitable et de réduire les risques de faillites.","Ses opposants estiment que le maintien de normes élevées protège la santé des consommateurs et les écosystèmes, et que la réponse aux distorsions doit passer par l'élévation des normes imposées aux importations.",'agr',[['*',"France Stratégie, Agriculture et environnement 2017 — <a href='https://www.strategie.gouv.fr' target='_blank'>strategie.gouv.fr</a>"]]],
["Les déserts médicaux doivent être combattus par une obligation d'installation des médecins dans les zones sous-dotées.","Environ 5\xa0millions de Français vivent dans des zones considérées comme des déserts médicaux en 2017<sup>*</sup>. Ce phénomène s'est aggravé avec la baisse du numerus clausus des décennies précédentes.","Ses partisans estiment qu'obliger les médecins à s'installer dans les zones sous-dotées est la seule mesure suffisamment efficace pour garantir l'accès aux soins sur l'ensemble du territoire.","Ses opposants estiment que la liberté d'installation est un principe reconnu et que des mesures incitatives — primes, allègements fiscaux — sont plus respectueuses de ce principe.",'soc',[['*',"CNOM, Atlas de la démographie médicale 2017 — <a href='https://www.conseil-national.medecin.fr' target='_blank'>conseil-national.medecin.fr</a>"]]],
['Les données personnelles collectées par les entreprises doivent être mieux protégées et les citoyens davantage en contrôle.',"Le Règlement Général sur la Protection des Données (RGPD) a été adopté par l'UE en avril\xa02016<sup>*</sup> mais n'entre en vigueur qu'en mai\xa02018. En 2017, la protection des données face aux GAFA est un sujet montant.",'Ses partisans estiment que renforcer les droits des citoyens sur leurs données personnelles redonne un contrôle réel et réduit la dépendance vis-à-vis des grandes plateformes.',"Ses opposants estiment que les cadres réglementaires en cours de déploiement (RGPD) doivent d'abord être bien appliqués avant d'être renforcés davantage.",'num',[['*',"Règlement (UE) 2016/679 du 27\xa0avril 2016 (RGPD) — <a href='https://eur-lex.europa.eu/legal-content/FR/TXT/?uri=CELEX%3A32016R0679' target='_blank'>eur-lex.europa.eu</a>"]]],
["Le droit à l'avortement doit être davantage protégé et son accès facilité.","L'avortement est légal en France depuis la loi Veil (1975)<sup>*</sup>. En 2017, les associations signalent des difficultés d'accès (fermetures de centres, délai légal) et des actions de militants anti-IVG. Certains candidats proposent de supprimer la clause de conscience spécifique des médecins.","Ses partisans estiment que renforcer la protection du droit à l'avortement et améliorer son accès est une exigence de santé publique et d'égalité entre les femmes.",'Ses opposants estiment que la loi Veil offre déjà un cadre équilibré, que la clause de conscience médicale doit être préservée, et que certains avancent des convictions éthiques sur la protection de la vie.','soc2',[['*',"Loi n°\xa075-17 du 17\xa0janvier 1975 — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000000508208' target='_blank'>legifrance.gouv.fr</a>"]]]];

utes.</p><div style="margin-top:8px;display:flex;gap:5px;flex-wrap:wrap"><span class="ct">35 questions</span><span class="ct">~10 min</span><span class="ct">Sources citées</span></div></div></div><div class="mc" onclick="sMode('deep')"><div class="mi">🔍</div><div><div style="font-size:16px;font-weight:700;margin-bottom:4px;color:var(--t1)">Test Complet</div><p class="bs">62 questions couvrant la quasi-totalité des programmes. Filtre thématique. Environ 20 minutes.</p><div style="margin-top:8px;display:flex;gap:5px;flex-wrap:wrap"><span class="ct">62 questions</span><span class="ct">~20 min</span><span class="ct">Filtre thématique</span></div></div></div><div class="mc hi" onclick="sMode('filter')" style="border-color:var(--priB)"><div class="mi" style="background:#fef2f2;border-color:#fecaca">🚫</div><div><div style="font-size:16px;font-weight:700;margin-bottom:4px;color:var(--t1)">Filtre Décisif</div><p class="bs">62 questions couvrant l'intégralité des programmes. Définissez vos <b style="color:var(--rt)">critères non négociables</b> — tout candidat qui s'y oppose est éliminé, même à 90 % de compatibilité globale. Les paradoxes sont analysés en fin de test.</p><div style="margin-top:8px;display:flex;gap:5px;flex-wrap:wrap"><span class="cr2">62 questions</span><span class="cr2">Lignes rouges</span><span class="cr2">Analyse paradoxes</span></div></div></div><div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--cb);display:flex;gap:10px;flex-wrap:wrap"><button class="se" onclick="sC()">${showCode?'▲ Masquer':'⚙ Algorithme'}</button><a href="https://github.com/miseenproduvendredi/Test-de-personnalite-politique" target="_blank" class="se" style="text-decoration:none">↗ Code source</a></div>${showCode?`<div style="margin-top:12px">${codeBlock()}</div>`:''}`
+civic();}

function sMode(m){mode=m;ans={};dbSet=new Set();detOpen=new Set();showCode=false;if(m==='deep'){selTh=new Set(TH);ph='themes';}else{aQ=m==='filter'?QF:Q35;ci=0;ph='intro';}R();}
function rThemes(){const n=QQ.filter(q=>selTh.has(q.th)).length;Z().innerHTML=nav()+`<div><div class="lb" style="margin-bottom:12px">Test Complet · Thèmes</div><p class="bm" style="margin-bottom:14px">Cochez les thèmes qui vous intéressent (tout coché par défaut).</p><div class="card" style="padding:14px 16px">${TH.map((t,i)=>`<label class="cbr" onclick="tTh(${i})"><span class="cbb${selTh.has(t)?' on':''}"></span>${t}</label>`).join('')}<div style="display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--cb)"><button class="se" onclick="sAll()">Tout cocher</button><button class="se" onclick="sNone()">Tout décocher</button></div></div><p class="bs" style="margin-bottom:16px">${n} question${n>1?'s':''} sélectionnée${n>1?'s':''}</p><button class="pr" onclick="lQ()" ${n===0?'disabled':''}>Commencer →</button></div>`;}
function tTh(i){const t=TH[i];selTh.has(t)?selTh.delete(t):selTh.add(t);R();}
function sAll(){TH.forEach(t=>selTh.add(t));R();}
function sNone(){selTh.clear();R();}
function lQ(){aQ=QQ.filter(q=>selTh.has(q.th));ci=0;ph='intro';R();}

  const isFlt=mode==='filter';
  Z().innerHTML=nav()+`<div>
<div class="lb" style="margin-bottom:12px">${modeLabel} · ${aQ.length} question${aQ.length>1?'s':''}</div>
<h2 style="font-size:20px;font-weight:700;color:var(--t1);font-family:Georgia,serif;margin-bottom:14px">Avant de commencer</h2>
<div class="card" style="margin-bottom:12px">
  <p style="font-size:14px;font-weight:700;color:var(--t1);margin-bottom:10px">📋 Principe</p>
  <p class="bm" style="margin-bottom:8px">Chaque question est une <strong>proposition politique</strong>. Vous indiquez si vous y êtes favorable ou non. Le test compare vos réponses aux positions officielles des 9 candidats du 1er tour 2017 et calcule votre compatibilité avec chacun.</p>
  <p class="bm">Aucune réponse n'est bonne ou mauvaise — exprimez uniquement <strong>votre opinion personnelle</strong>.</p>
</div>
<div class="card" style="margin-bottom:12px">
