  <div style="display:flex;flex-direction:column;gap:8px">
    <div style="display:flex;align-items:flex-start;gap:10px"><span style="font-size:12px;font-weight:700;color:var(--rt);width:175px;flex-shrink:0">Totalement en désaccord</span><span class="bm">Vous êtes fermement contre cette proposition.</span></div>
    <div style="display:flex;align-items:flex-start;gap:10px"><span style="font-size:12px;font-weight:700;color:#ea580c;width:175px;flex-shrink:0">Plutôt en désaccord</span><span class="bm">Vous pencheriez plutôt contre.</span></div>
    <div style="display:flex;align-items:flex-start;gap:10px"><span style="font-size:12px;font-weight:700;color:var(--t3);width:175px;flex-shrink:0">Sans opinion</span><span class="bm">Vous n'avez pas d'avis tranché sur ce sujet.</span></div>
    <div style="display:flex;align-items:flex-start;gap:10px"><span style="font-size:12px;font-weight:700;color:#15803d;width:175px;flex-shrink:0">Plutôt d'accord</span><span class="bm">Vous pencheriez plutôt pour.</span></div>
    <div style="display:flex;align-items:flex-start;gap:10px"><span style="font-size:12px;font-weight:700;color:var(--gk);width:175px;flex-shrink:0">Totalement d'accord</span><span class="bm">Vous êtes fermement pour cette proposition.</span></div>
  </div>
</div>
<div class="card" style="margin-bottom:12px;background:var(--wg);border-color:var(--wb)">
  <p style="font-size:14px;font-weight:700;color:var(--wt);margin-bottom:7px">⚠️ Attention : "Sans opinion"</p>
  <p class="bm" style="color:var(--wt)">Répondre "sans opinion" assigne la valeur <strong>0</strong> à votre vote, ce qui tire le score vers <strong>50 %</strong> sur cette question — atténuant les différences entre candidats. Si vous ne connaissez pas un sujet, utilisez <strong>❓ Je ne connais pas ce sujet</strong> : la question sera totalement exclue du calcul, sans biaiser le résultat.</p>
</div>
${isFlt?`<div class="card" style="margin-bottom:12px;background:var(--rg);border:1px solid var(--rb)">
  <p style="font-size:14px;font-weight:700;color:var(--rt);margin-bottom:10px">🚫 Mode Filtre Décisif — comment fonctionne l'élimination ?</p>
  <p class="bm" style="color:var(--rt);margin-bottom:10px"><strong>Principe :</strong> Lorsque vous répondez <strong>"Totalement d'accord" (+2)</strong> ou <strong>"Totalement en désaccord" (−2)</strong> à une question, vous posez une <strong>ligne rouge</strong>. Tout candidat dont la position est opposée à la vôtre sur ce point est <strong>éliminé définitivement</strong>, quel que soit son score global.</p>
  <p class="bm" style="color:var(--rt);margin-bottom:10px"><strong>Exemple :</strong> Vous répondez "Totalement en désaccord" sur la réduction des dépenses publiques. Un candidat favorable à cette réduction sera éliminé — même si vous êtes d'accord avec 90 % du reste de son programme.</p>
  <p class="bm" style="color:var(--rt);margin-bottom:10px"><strong>Les paradoxes :</strong> À la fin du test, si un candidat éliminé affiche malgré tout une compatibilité globale élevée (≥ 65 %), le test signale un paradoxe et vous invite à reconsidérer si ce critère est vraiment rédhibitoire pour vous.</p>
  <p class="bm" style="color:var(--rt)"><strong>Conseil :</strong> Réservez les réponses "totalement" aux enjeux sur lesquels vous avez une conviction absolue.</p>
</div>`:''}
<div class="card" style="margin-bottom:20px">
  <p style="font-size:14px;font-weight:700;color:var(--t1);margin-bottom:7px">ℹ️ Contexte disponible pour chaque question</p>
  <p class="bm">Pour chaque question, un bouton vous donne accès au contexte factuel, aux arguments des deux camps et aux sources officielles. Vous pouvez le consulter avant de répondre.</p>
</div>
<button class="pr" onclick="ph='quiz';R()">Commencer →</button>
</div>`;
}

function rQuiz(){
  const q=aQ[ci],a=ans[q.id],isFlt=mode==='filter',isLast=ci===aQ.length-1;
  const pct=(isLast&&a!==undefined)?100:Math.round(ci/aQ.length*100);
  const sc=v=>{if(a===v)return v===-2?'sn2':v===-1?'sn1':v===0?'s0':v===1?'s1':'s2';return '';};
  const isDet=detOpen.has(q.id);
  const ce=getElim(),ec=Object.keys(ce).length;
  const ebar=isFlt&&ec>0?`<div style="background:var(--rg);border:1px solid var(--rb);border-radius:10px;padding:10px 13px;margin-bottom:12px;font-size:13px;color:var(--rt);font-weight:500">🔴 ${ec} candidat${ec>1?'s':''} éliminé${ec>1?'s':''} : ${Object.keys(ce).map(k=>CV[k].n.split(' ').slice(-1)[0]).join(', ')}</div>`:'';
  const fhint=isFlt?`<div style="padding:11px 14px;border-radius:10px;background:var(--rg);border:1px solid var(--rb);font-size:13px;color:var(--rt);margin-bottom:12px;line-height:1.6">🚫 <b>Filtre Décisif</b> — Répondre <b>"Totalement d'accord"</b> ou <b>"Totalement en désaccord"</b> pose une <b>ligne rouge</b> : tout candidat dont la position est opposée à la vôtre est éliminé, même si vous êtes d'accord avec 90 % de son programme.</div>`:'';
  const notesHtml=q.notes.length?`<div class="fn">${q.notes.map(n=>`<div style="margin-bottom:3px"><sup>${n[0]}</sup> ${n[1]}</div>`).join('')}</div>`:'';
  const detBox=isDet?`<div class="dbox"><p style="font-size:11px;font-weight:700;color:var(--pri);margin-bottom:8px;text-transform:uppercase;letter-spacing:.07em">Contexte factuel</p><p style="font-size:13.5px;color:var(--t2);line-height:1.75;margin-bottom:13px">${q.ctx}</p><div style="height:1px;background:var(--cb);margin-bottom:13px"></div><p style="font-size:11px;font-weight:700;color:var(--t4);margin-bottom:9px;text-transform:uppercase;letter-spacing:.07em">Arguments</p>${argRow('pour',q.arg1)}${argRow('contre',q.arg2)}<div style="margin-top:12px;padding-top:10px;border-top:.5px solid var(--cb)"><div class="lb" style="margin-bottom:7px">Sources pour approfondir</div><div style="display:flex;flex-wrap:wrap;gap:12px">${q.src.map(s=>`<a class="sa" href="${s.u}" target="_blank">→ ${s.l}</a>`).join('')}</div></div>${notesHtml}</div>`:'';
  const isRL=dbSet.has(q.id);
  const rlb=isRL?`<div style="display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:20px;background:var(--rg);border:1px solid var(--rb);font-size:13px;color:var(--rt);font-weight:600;margin-top:10px">🔴 Ligne rouge active — candidats opposés éliminés</div>`:'';
  const nxt=isLast&&a!==undefined?`<button class="pr" onclick="finish()">Voir les résultats →</button>`:`<span class="bs">${a!==undefined?'Passage auto dans 0,5 s…':'Sélectionnez une réponse'}</span>`;
  Z().innerHTML=nav()+`<div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px"><span class="bs" style="font-weight:600;color:var(--pri)">${isFlt?'Filtre Décisif':mode==='quick'?'Test Rapide':'Test Complet'} · Q${ci+1}/${aQ.length}</span><span class="bs">${pct}%</span></div><div class="pb2" style="margin-bottom:14px"><div class="pf" style="width:${pct}%"></div></div>${ebar}<div class="card">${fhint}<span style="display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;background:var(--priL);color:var(--pri);border:1px solid var(--priB);margin-bottom:13px">${q.th}</span><p class="qt" style="margin-bottom:16px">${q.t}</p><p class="bs" style="margin-bottom:7px;font-weight:600;color:var(--t3)">Votre réponse :</p><div style="display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:5px;margin-bottom:8px">${LK.map(l=>`<button class="ab ${sc(l.v)}" onclick="pick(${l.v})">${l.l.replace('\n','<br>')}</button>`).join('')}</div><button class="ab sk" style="width:100%;margin-bottom:10px" onclick="pickSk()">❓ Je ne connais pas ce sujet</button>${rlb}<button class="db${isDet?' on':''}" onclick="tDet(${q.id})">${isDet?'▲ Masquer le contexte':'ℹ️ Contexte, arguments &amp; sources'}</button>${detBox}</div>${showCode?`<div style="margin-top:10px">${codeBlock()}</div>`:''}<div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;flex-wrap:wrap;gap:8px"><div style="display:flex;gap:8px"><button class="se" onclick="gBack()">← Retour</button><button class="se" style="font-size:12px" onclick="sC()">${showCode?'▲':'⚙'} Code</button></div>${nxt}</div></div>`;}

function tDet(qid){detOpen.has(qid)?detOpen.delete(qid):detOpen.add(qid);R();}
function pick(v){if(tmr){clearTimeout(tmr);tmr=null;}ans[aQ[ci].id]=v;if(mode==='filter'&&(v===2||v===-2))dbSet.add(aQ[ci].id);else if(mode==='filter')dbSet.delete(aQ[ci].id);R();if(document.activeElement)document.activeElement.blur();if(ci<aQ.length-1)tmr=setTimeout(()=>{ci++;R();},500);}
function pickSk(){if(tmr){clearTimeout(tmr);tmr=null;}ans[aQ[ci].id]='skip';R();if(document.activeElement)document.activeElement.blur();if(ci<aQ.length-1)tmr=setTimeout(()=>{ci++;R();},500);}
function gBack(){if(tmr){clearTimeout(tmr);tmr=null;}if(ci>0){ci--;R();}else{ph=mode==='deep'?'themes':'home';R();}}
function finish(){ph='results';showCode=false;R();}

function rRes(){
  const res=compute(),td=tend(res.ux,res.uy),elim=getElim();
  const skipped=aQ.filter(q=>ans[q.id]==='skip');
  const thCount=new Set(aQ.map(q=>q.th)).size;
  const sansCnt=aQ.filter(q=>ans[q.id]===0).length;
  const answCnt=aQ.filter(q=>ans[q.id]!==undefined).length;
  const sansRatio=answCnt>0?sansCnt/answCnt:0;
  const sansWarn=sansRatio>0.3?`<div style="background:var(--wg);border:1px solid var(--wb);border-radius:12px;padding:14px 16px;margin-bottom:16px"><div style="font-size:14px;font-weight:700;color:var(--wt);margin-bottom:8px">⚠️ Résultats à interpréter avec précaution</div><p style="font-size:13.5px;line-height:1.7;color:var(--wt);margin-bottom:8px">Vous avez répondu <strong>"Sans opinion"</strong> à <strong>${sansCnt} question${sansCnt>1?'s':''} sur ${answCnt}</strong> (${Math.round(sansRatio*100)}%). Cette valeur est encodée à <code style="background:rgba(0,0,0,.06);padding:1px 5px;border-radius:3px">0</code> dans le calcul, ce qui tire les scores de compatibilité vers <strong>50 %</strong> sur ces sujets et atténue les différences entre candidats.</p><p style="font-size:13.5px;line-height:1.7;color:var(--wt)">Pour des résultats plus discriminants, relancez le test en utilisant <strong>❓ Je ne connais pas ce sujet</strong> (skip) sur les questions que vous ne maîtrisez pas — ces questions seront exclues du calcul plutôt que neutralisées à 50 %.</p></div>`:'';

  const candsH=res.sorted.map(([k,p],i)=>{
    const isE=!!elim[k],isTop=i===0&&!isE,isPx=isE&&p>=65;
    const{ag,di}=getDet(k);const conflicts=elim[k]||[];
    const VLBL={'-2':'Totalement contre','-1':'Plutôt contre','0':'Sans opinion','1':'Plutôt pour','2':'Totalement pour','skip':'Non répondu'};
    const CLBL={'-2':'Totalement contre','-1':'Plutôt contre','0':'Neutre',1:'Plutôt pour',2:'Totalement pour'};
    function qRow(t,q2){const uv=ans[q2?.id];const cv=q2?.p[k];const uvl=uv!==undefined?VLBL[String(uv)]:'—';const cvl=cv!==undefined?CLBL[String(cv)]||cv:'—';return`<div class="di"><span class="dot" style="background:#16a34a"></span><div style="flex:1"><span>${t}</span><div style="display:flex;gap:8px;margin-top:3px;flex-wrap:wrap"><span style="font-size:11px;background:var(--priL);color:var(--pri);padding:1px 7px;border-radius:6px;border:.5px solid var(--priB)">Vous : ${uvl}</span><span style="font-size:11px;background:var(--gg);color:var(--gk);padding:1px 7px;border-radius:6px;border:.5px solid #bbf7d0">Candidat : ${cvl}</span></div></div></div>`;}
    function dqRow(t,q2){const uv=ans[q2?.id];const cv=q2?.p[k];const uvl=uv!==undefined?VLBL[String(uv)]:'—';const cvl=cv!==undefined?CLBL[String(cv)]||cv:'—';return`<div class="di"><span class="dot" style="background:var(--rt)"></span><div style="flex:1"><span>${t}</span><div style="display:flex;gap:8px;margin-top:3px;flex-wrap:wrap"><span style="font-size:11px;background:var(--rg);color:var(--rt);padding:1px 7px;border-radius:6px;border:.5px solid var(--rb)">Vous : ${uvl}</span><span style="font-size:11px;background:var(--gg);color:var(--gk);padding:1px 7px;border-radius:6px;border:.5px solid #bbf7d0">Candidat : ${cvl}</span></div></div></div>`;}
    const pill=(label,col)=>`<span style="display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:2px 9px;border-radius:6px;border:1px solid ${col}22;background:${col}11;color:${col};white-space:nowrap">${label}</span>`;
    const agRow=o=>`<div style="display:flex;flex-direction:column;gap:5px;padding:7px 0;border-bottom:.5px solid var(--cb)"><span style="font-size:13px;color:var(--t1);line-height:1.5">${o.t}</span><div style="display:flex;flex-wrap:wrap;gap:6px">${pill('Vous\u00a0: '+o.uv,'#15803d')}${pill('Candidat\u00a0: '+o.cp,'var(--t4)')}</div></div>`;
    const diRow=o=>`<div style="display:flex;flex-direction:column;gap:5px;padding:7px 0;border-bottom:.5px solid var(--cb)"><span style="font-size:13px;color:var(--t1);line-height:1.5">${o.t}</span><div style="display:flex;flex-wrap:wrap;gap:6px">${pill('Vous\u00a0: '+o.uv,'#dc2626')}${pill('Candidat\u00a0: '+o.cp,'var(--t4)')}</div></div>`;
    const agH=ag.length?`<div style="margin-bottom:4px">${ag.map(agRow).join('')}</div>`:`<div style="font-size:13px;color:var(--t4);padding:6px 0">Aucun accord notable</div>`;
    const diH=di.length?`<div style="margin-bottom:4px">${di.map(diRow).join('')}</div>`:`<div style="font-size:13px;color:var(--t4);padding:6px 0">Aucun désaccord notable</div>`;
    const conflH=conflicts.length?`<div style="background:var(--rg);border:1px solid var(--rb);border-radius:9px;padding:12px;margin-bottom:12px"><div style="font-size:13px;font-weight:700;color:var(--rt);margin-bottom:7px">🔴 Raison${conflicts.length>1?'s':''} d'élimination</div>${conflicts.map(t=>`<div style="font-size:13px;color:var(--rt);line-height:1.6;padding:5px 0;border-bottom:.5px solid var(--rb)">· ${t}</div>`).join('')}</div>`:'';
    const pxH=isPx?`<div style="background:var(--wg);border:1px solid var(--wb);border-radius:9px;padding:15px;margin-bottom:12px"><div style="font-size:14px;font-weight:700;color:var(--wt);margin-bottom:9px">⚠️ Paradoxe détecté — à reconsidérer</div><p style="font-size:14px;color:var(--wt);line-height:1.65;margin-bottom:9px">Vous avez éliminé <b>${CV[k].n}</b> sur une ligne rouge, mais ce candidat affiche une compatibilité globale de <b>${p}%</b> sur l'ensemble des questions.</p><p style="font-size:13px;color:var(--wt);line-height:1.7;margin-bottom:9px"><strong>Ce que cela signifie :</strong> vous êtes en accord avec ${p}% des propositions de ce candidat, calculé sur la totalité de son programme.</p><p style="font-size:13px;color:var(--wt);line-height:1.7"><strong>La question à vous poser :</strong> ce désaccord spécifique est-il vraiment suffisant, à lui seul, pour exclure un candidat avec qui vous partagez ${p}% des positions ? Le test ne tranche pas — il vous donne les éléments pour décider.</p></div>`:'';

ec compatibilité ≥ 65%. Positions encodées sur programmes officiels de campagne 2017. Projet indépendant, aucune orientation d'opinion. Chaque chiffre cité dans les contextes est sourcé par une référence officielle accessible via les liens <sup>*</sup>.</p></div><div style="margin-top:15px;display:flex;gap:10px;flex-wrap:wrap"><button class="se" onclick="sC()">${showCode?'▲ Masquer':'⚙ Algorithme'}</button><a href="https://github.com/miseenproduvendredi/Test-de-personnalite-politique" target="_blank" class="se" style="text-decoration:none">↗ Code source</a><button class="se" onclick="gH()">↩ Recommencer</button></div>${showCode?`<div style="margin-top:14px">${codeBlock()}</div>`:''}<div style="background:var(--card);border-left:4px solid var(--pri);border-radius:0 14px 14px 0;padding:18px 20px;margin-top:18px;box-shadow:var(--card-shadow)"><p style="font-size:15px;font-weight:700;color:var(--t1);margin-bottom:12px">🗳️ Avant de conclure — une mise en perspective</p><p class="bm" style="margin-bottom:10px">Ce test vous indique avec quel candidat vos opinions <strong>programmatiques</strong> sont les plus proches. Mais voter pour un candidat, c'est voter pour <strong>l'intégralité de son programme</strong> — pas seulement pour les points sur lesquels vous êtes d'accord.</p><p class="bm" style="margin-bottom:10px">Un candidat qui correspond à votre conviction la plus forte peut simultanément défendre des positions que vous désapprouvez sur d'autres. Le score affiché en tient compte — mais c'est vous qui décidez du poids accordé à chaque enjeu.</p><p class="bm" style="margin-bottom:10px"><strong>Le candidat parfait n'existe certainement pas.</strong> Voter, c'est presque toujours accepter des concessions. La vraie question n'est pas "quel candidat correspond à 100 % de mes positions ?" — cette personne n'existe pas — mais : "sur quels enjeux suis-je prêt à faire des concessions, et sur lesquels est-ce absolument impossible ?"</p><p class="bm">Ce test vous donne des éléments. La réflexion finale vous appartient.</p></div></div>`
  
+civic();
