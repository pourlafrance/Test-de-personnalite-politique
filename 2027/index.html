  const detBox=isDet?`<div class="dbox" style="margin-top:12px"><p style="font-size:11px;font-weight:700;color:var(--pri);margin-bottom:8px;text-transform:uppercase;letter-spacing:.07em">Contexte factuel</p><p style="font-size:13.5px;color:var(--t2);line-height:1.75;margin-bottom:13px">${q.ctx}</p><div style="height:1px;background:var(--cb);margin-bottom:13px"></div><p style="font-size:11px;font-weight:700;color:var(--t4);margin-bottom:9px;text-transform:uppercase;letter-spacing:.07em">Arguments</p>${argRow('pour',q.arg1)}${argRow('contre',q.arg2)}<div style="margin-top:12px;padding-top:10px;border-top:.5px solid var(--cb)"><div class="lb" style="margin-bottom:7px">Sources pour approfondir</div><div style="display:flex;flex-wrap:wrap;gap:12px">${q.src.map(s=>`<a class="sa" href="${s.u}" target="_blank">→ ${s.l}</a>`).join('')}</div></div>${notesHtml}</div>`:'';
  const isRL=dbSet.has(q.id);
  const rlb=isRL?`<div style="display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;background:var(--rg);border:1px solid var(--rb);font-size:12px;color:var(--rt);font-weight:600;margin-top:8px">🔴 Ligne rouge active — candidats opposés éliminés</div>`:'';

  const nxt=isLast&&a!==undefined?`<button class="pr" onclick="finish()">Voir les résultats →</button>`:`<span class="bs">${a!==undefined?'Passage auto dans 0,5 s…':''}</span>`;
  const modalHTML=resModal?`<div id="res-modal" style="position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.55);backdrop-filter:blur(3px)" onclick="if(event.target.id==='res-modal'){resModal=false;R();}"><div style="background:var(--card);border-radius:18px;padding:28px 24px;max-width:380px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center"><div style="font-size:32px;margin-bottom:12px">🏁</div><div style="font-size:19px;font-weight:700;color:var(--t1);font-family:Georgia,serif;margin-bottom:8px">Test terminé !</div><p style="font-size:14px;color:var(--t3);line-height:1.6;margin-bottom:22px">Vous avez répondu à toutes les questions. Découvrez vos résultats ou revenez à la dernière question.</p><button onclick="finish()" style="display:block;width:100%;padding:13px;background:var(--pri);color:#fff;border:none;border-radius:11px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px;touch-action:manipulation">Voir mes résultats →</button><button onclick="resModal=false;R();" style="display:block;width:100%;padding:11px;background:transparent;color:var(--t3);border:1.5px solid var(--cb);border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;touch-action:manipulation">← Revenir à la dernière question</button></div></div>`:'';

  Z().innerHTML=nav()+simBanner()+`<div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px"><span class="bs" style="font-weight:600;color:var(--pri)">${isFlt?'Filtre Décisif':mode==='quick'?'Test Rapide':'Test Complet'} · Q${ci+1}/${aQ.length}</span><span class="bs">${pct}%</span></div><div class="pb2" style="margin-bottom:14px"><div class="pf" style="width:${pct}%"></div></div>${ebar}<div class="card">${fhint}<span style="display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;background:var(--priL);color:var(--pri);border:1px solid var(--priB);margin-bottom:13px">${q.th}</span><p class="qt" style="margin-bottom:14px">${q.t}</p><p class="bs" style="margin-bottom:10px;font-weight:500;color:var(--t3)">Sélectionnez une réponse</p><div style="display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:5px;margin-bottom:8px">${LK.map(l=>`<button class="ab ${sc(l.v)}" onclick="pick(${l.v})">${l.l.replace('\n','<br>')}</button>`).join('')}</div><button class="ab sk" style="width:100%;margin-bottom:3px" onclick="pickSk()">❓ Je ne connais pas ce sujet</button>${rlb}<div style="margin-top:12px;border-top:.5px solid var(--cb);padding-top:12px"><button class="db${isDet?' on':''}" onclick="tDet(${q.id})">${isDet?'▲ Masquer le contexte':'ℹ️ Contexte, arguments &amp; sources'}</button></div>${detBox}</div>${showCode?`<div style="margin-top:10px">${codeBlock()}</div>`:''}<div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;flex-wrap:wrap;gap:8px"><div style="display:flex;gap:8px"><button class="se" onclick="gBack()">← Retour</button><button class="se" style="font-size:12px" onclick="sC()">${showCode?'▲':'⚙'} Code</button></div>${nxt}</div></div>${resModal?modalHTML:''}`;}

function tDet(qid){detOpen.has(qid)?detOpen.delete(qid):detOpen.add(qid);R();}
function pick(v){if(tmr){clearTimeout(tmr);tmr=null;}ans[aQ[ci].id]=v;if(mode==='filter'&&(v===2||v===-2))dbSet.add(aQ[ci].id);else if(mode==='filter')dbSet.delete(aQ[ci].id);R();if(document.activeElement)document.activeElement.blur();if(ci<aQ.length-1){tmr=setTimeout(()=>{ci++;R();},500);}else{resModal=true;R();}}
function pickSk(){if(tmr){clearTimeout(tmr);tmr=null;}ans[aQ[ci].id]='skip';R();if(document.activeElement)document.activeElement.blur();if(ci<aQ.length-1){tmr=setTimeout(()=>{ci++;R();},500);}else{resModal=true;R();}}
function gBack(){if(tmr){clearTimeout(tmr);tmr=null;}if(ci>0){ci--;R();}else{ph=mode==='deep'?'themes':'home';R();}}
function finish(){ph='results';showCode=false;resModal=false;R();}

function rRes(){
  const res=compute(),td=tend(res.ux,res.uy),elim=getElim();
  const skipped=aQ.filter(q=>ans[q.id]==='skip');
  const thCount=new Set(aQ.map(q=>q.th)).size;
  const sansCnt=aQ.filter(q=>ans[q.id]===0).length;
  const answCnt=aQ.filter(q=>ans[q.id]!==undefined).length;
  const sansRatio=answCnt>0?sansCnt/answCnt:0;
  const sansWarn=sansRatio>0.3?`<div style="background:var(--wg);border:1px solid var(--wb);border-radius:12px;padding:14px 16px;margin-bottom:16px"><div style="font-size:14px;font-weight:700;color:var(--wt);margin-bottom:8px">⚠️ Résultats à interpréter avec précaution</div><p style="font-size:13.5px;line-height:1.7;color:var(--wt);margin-bottom:8px">Vous avez répondu <strong>"Sans opinion"</strong> à <strong>${sansCnt} question${sansCnt>1?'s':''} sur ${answCnt}</strong> (${Math.round(sansRatio*100)}%). Cette valeur est encodée à <code style="background:rgba(0,0,0,.06);padding:1px 5px;border-radius:3px">0</code> dans le calcul, ce qui tire les scores de compatibilité vers <strong>50 %</strong> sur ces sujets et atténue les différences entre candidats.</p><p style="font-size:13.5px;line-height:1.7;color:var(--wt)">Pour des résultats plus discriminants, relancez le test en utilisant <strong>❓ Je ne connais pas ce sujet</strong> (skip) sur les questions que vous ne maîtrisez pas — ces questions seront exclues du calcul plutôt que neutralisées à 50 %.</p></div>`:'';

  const candsH=res.sorted.map(([k,p],i)=>{
    const isE=!!elim[k],isTop=i===0&&!isE,isPx=isE&&p>=65;
    const{ag,di}=getDet(k);const conflicts=elim[k]||[];
    const pill=(label,col)=>`<span style="display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:2px 9px;border-radius:6px;border:1px solid ${col}22;background:${col}11;color:${col};white-space:nowrap">${label}</span>`;
    const agRow=o=>`<div style="display:flex;gap:0;margin-bottom:5px;border-radius:8px;overflow:hidden;border:.5px solid #bbf7d0;background:${dk?'rgba(34,197,94,.06)':'#f0fdf4'}"><div style="width:3px;background:#22c55e;flex-shrink:0"></div><div style="padding:7px 10px;flex:1"><div style="font-size:12.5px;color:var(--t1);line-height:1.4;margin-bottom:5px">✅ ${o.t}</div><div style="display:flex;gap:5px;flex-wrap:wrap"><span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:5px;background:rgba(34,197,94,.15);color:#15803d;border:.5px solid #bbf7d0">Vous : ${o.uv}</span><span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:5px;background:rgba(34,197,94,.10);color:#15803d;border:.5px solid #bbf7d0">Candidat : ${o.cp}</span></div></div></div>`;
    const diRow=o=>`<div style="display:flex;gap:0;margin-bottom:5px;border-radius:8px;overflow:hidden;border:.5px solid #fecaca;background:${dk?'rgba(239,68,68,.06)':'#fef2f2'}"><div style="width:3px;background:#ef4444;flex-shrink:0"></div><div style="padding:7px 10px;flex:1"><div style="font-size:12.5px;color:var(--t1);line-height:1.4;margin-bottom:5px">❌ ${o.t}</div><div style="display:flex;gap:5px;flex-wrap:wrap"><span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:5px;background:rgba(239,68,68,.15);color:#dc2626;border:.5px solid #fecaca">Vous : ${o.uv}</span><span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:5px;background:rgba(100,116,139,.12);color:var(--t3);border:.5px solid var(--cb)">Candidat : ${o.cp}</span></div></div></div>`;
    const tot=ag.length+di.length;
    const agPct=tot>0?Math.round(ag.length/tot*100):50;
    const summaryBar=tot>0?`<div style="margin-bottom:13px"><div style="display:flex;justify-content:space-between;font-size:11px;font-weight:600;margin-bottom:5px"><span style="color:#15803d">✅ ${ag.length} accord${ag.length>1?'s':''}</span><span style="color:#dc2626">${di.length} désaccord${di.length>1?'s':''} ❌</span></div><div style="height:7px;border-radius:4px;overflow:hidden;background:var(--cb)"><div style="height:100%;width:${agPct}%;background:linear-gradient(90deg,#22c55e,#4ade80);border-radius:4px 0 0 4px;transition:width .4s"></div></div></div>`:'';
    const agH=ag.length?`<div style="margin-bottom:4px">${ag.map(agRow).join('')}</div>`:`<div style="font-size:13px;color:var(--t4);padding:6px 0">Aucun accord notable</div>`;
    const diH=di.length?`<div style="margin-bottom:4px">${di.map(diRow).join('')}</div>`:`<div style="font-size:13px;color:var(--t4);padding:6px 0">Aucun désaccord notable</div>`;
    const conflH=conflicts.length?`<div style="background:var(--rg);border:1px solid var(--rb);border-radius:9px;padding:12px;margin-bottom:12px"><div style="font-size:13px;font-weight:700;color:var(--rt);margin-bottom:7px">🔴 Raison${conflicts.length>1?'s':''} d'élimination</div>${conflicts.map(t=>`<div style="font-size:13px;color:var(--rt);line-height:1.6;padding:5px 0;border-bottom:.5px solid var(--rb)">· ${t}</div>`).join('')}</div>`:'';
    const pxH=isPx?`<div style="background:var(--wg);border:1px solid var(--wb);border-radius:9px;padding:14px;margin-bottom:12px"><div style="font-size:13px;font-weight:700;color:var(--wt);margin-bottom:8px">⚠ Paradoxe détecté</div><p style="font-size:14px;color:var(--wt);line-height:1.65;margin-bottom:8px"><b>${CV[k].n}</b> est éliminé sur votre ligne rouge, mais affiche <b>${p}% de compatibilité</b> sur les 62 questions.</p><p style="font-size:13px;color:var(--wt);line-height:1.65">Ce score est calculé sur la totalité du programme. Le désaccord identifié est-il vraiment rédhibitoire ?</p></div>`:'';
    return`<div class="cr${isE?' el':''}${isTop?' tp':''}"><div class="ch2" onclick="tCand('${k}')"><div style="display:flex;align-items:center;gap:8px;min-width:0"><span style="width:10px;height:10px;border-radius:50%;background:${CV[k].c};display:inline-block;flex-shrink:0;box-shadow:0 0 0 2px ${CV[k].c}22"></span><span style="font-size:15px;font-weight:${isTop?700:500};color:var(--t1);white-space:nowrap">${CV[k].n}</span><span class="bs" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${CV[k].p}</span>${isE?`<span style="font-size:11px;background:var(--rg);color:var(--rt);padding:2px 7px;border-radius:8px;flex-shrink:0;font-weight:700;border:.5px solid var(--rb)">éliminé</span>`:''}${isPx?`<span style="font-size:11px;background:var(--wg);color:var(--wt);padding:2px 7px;border-radius:8px;flex-shrink:0;border:.5px solid var(--wb)">⚠ paradoxe</span>`:''}</div><div style="display:flex;align-items:center;gap:5px;flex-shrink:0"><span style="font-size:16px;font-weight:700;color:${isTop?CV[k].c:'var(--t4)'}">${p}%</span><span id="arr-${k}" style="font-size:11px;color:var(--t4)">▼</span></div></div><div class="bar" style="margin:0 13px 9px"><div class="bf" data-w="${p}" style="background:${CV[k].c};opacity:${isE?.25:isTop?1:.7}"></div></div><div id="det-${k}" class="cd">${conflH}${pxH}${summaryBar}<div class="lb" style="margin-bottom:5px">✅ Accords (${ag.length})</div>${agH}<div class="lb" style="margin:10px 0 5px">❌ Désaccords (${di.length})</div>${diH}</div></div>`;
  }).join('');
  const skipSec=skipped.length?`<div style="margin-top:22px"><div style="font-size:15px;font-weight:700;color:var(--t1);margin-bottom:6px">❓ Sujets non répondus — sources pour se renseigner</div><p class="bs" style="margin-bottom:12px">${skipped.length} sujet${skipped.length>1?'s':''} passé${skipped.length>1?'s':''}.</p>${skipped.map(q=>{const nn=q.notes.length?`<div class="fn" style="margin-top:8px">${q.notes.map(n=>`<div><sup>${n[0]}</sup> ${n[1]}</div>`).join('')}</div>`:'';return`<div style="background:var(--priL);border:1px solid var(--priB);border-radius:10px;padding:13px;margin-bottom:9px"><div style="font-size:14px;font-weight:600;color:var(--t1);margin-bottom:6px">${q.th} — ${q.t}</div><p style="font-size:13px;color:var(--t2);line-height:1.65;margin-bottom:10px">${q.ctx}</p>${argRow('pour',q.arg1)}${argRow('contre',q.arg2)}${nn}<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:10px">${q.src.map(s=>`<a class="sa" href="${s.u}" target="_blank">→ ${s.l}</a>`).join('')}</div></div>`;}).join('')}</div>`:'';
  const srcMap={};aQ.forEach(q=>{if(!srcMap[q.th])srcMap[q.th]={th:q.th,src:q.src};});
  const srcH=Object.values(srcMap).map(({th,src})=>`<div style="margin-bottom:11px"><p class="bs" style="font-weight:600;margin-bottom:5px">${th}</p>${src.map(s=>`<a class="sa" href="${s.u}" target="_blank" style="margin-right:14px">→ ${s.l}</a>`).join('')}</div>`).join('');
  Z().innerHTML=nav()+simBanner()+`<div><div class="lb" style="margin-bottom:12px">Résultats · ${mode==='quick'?'Test Rapide':mode==='deep'?'Test Complet':'Filtre Décisif'}</div><div class="sc"><div class="lb" style="margin-bottom:6px">Votre tendance politique</div><div style="font-size:24px;font-weight:700;margin-bottom:9px;color:var(--t1);font-family:Georgia,serif">${td.l}</div><p class="bm">${td.d}</p>${skipped.length?`<p class="bs" style="margin-top:7px">${skipped.length} sujet${skipped.length>1?'s':''} passé${skipped.length>1?'s':''} — exclus du calcul</p>`:''}</div>`+sansWarn+`<div class="card" style="padding:15px;margin-bottom:15px"><div style="font-size:15px;font-weight:700;margin-bottom:10px;color:var(--t1)">Boussole politique</div>${compass(res.ux,res.uy)}<div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:4px;margin-top:10px">${CK.map(k=>`<div style="display:flex;align-items:center;gap:5px;overflow:hidden"><span style="width:7px;height:7px;border-radius:50%;background:${CV[k].c};flex-shrink:0;display:inline-block"></span><span class="bs" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${CV[k].n.split(' ').slice(-1)[0]}</span></div>`).join('')}</div></div><div style="background:var(--card);border:.5px solid var(--cb);border-radius:14px;padding:18px 20px;margin-bottom:15px;box-shadow:var(--card-shadow)"><div style="font-size:15px;font-weight:700;color:var(--t1);margin-bottom:14px">💡 Avant de conclure — une mise en perspective</div><p style="font-size:13.5px;line-height:1.75;color:var(--t2);margin-bottom:10px;text-align:justify">Ce test vous indique avec quel candidat vos opinions programmatiques sont les plus proches. Mais voter pour un candidat, c'est voter pour <strong>l'intégralité de son programme</strong> — pas seulement pour les points sur lesquels vous êtes d'accord.</p><p style="font-size:13.5px;line-height:1.75;color:var(--t2);margin-bottom:10px;text-align:justify">Un candidat qui correspond à votre conviction la plus forte peut simultanément défendre des positions que vous désapprouvez sur d'autres. Le score affiché en tient compte — mais c'est vous qui décidez du poids accordé à chaque enjeu.</p><p style="font-size:13.5px;line-height:1.75;color:var(--t2);margin-bottom:10px;text-align:justify"><strong>Le candidat parfait n'existe certainement pas.</strong> Voter, c'est presque toujours accepter des concessions. La vraie question n'est pas «&nbsp;quel candidat correspond à 100&nbsp;% de mes positions&nbsp;?&nbsp;» — cette personne n'existe pas — mais&nbsp;: «&nbsp;sur quels enjeux suis-je prêt à faire des concessions, et sur lesquels est-ce absolument impossible&nbsp;?&nbsp;»</p><p style="font-size:13.5px;line-height:1.75;color:var(--t2);margin-bottom:16px;text-align:justify">Ce test vous donne des éléments. La réflexion finale vous appartient.</p><div style="height:1px;background:var(--cb);margin-bottom:14px"></div><div style="background:var(--priL);border:1px solid var(--priB);border-radius:10px;padding:14px 16px;margin-bottom:0"><div style="font-size:13px;font-weight:700;color:var(--pri);margin-bottom:9px">⚠️ Le biais du vote utile</div><p style="font-size:13.5px;line-height:1.75;color:var(--t2);margin-bottom:12px;text-align:justify">Écarter un candidat parce qu'on le juge <em>«&nbsp;pas assez populaire pour gagner&nbsp;»</em>, c'est laisser les sondages décider à votre place avant même l'élection. C'est un biais documenté&nbsp;: en renonçant à votre préférence réelle, vous contribuez précisément au résultat que vous redoutiez — et vous privez ce candidat d'un signal politique réel sur son score.</p><button onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';this.textContent=this.nextElementSibling.style.display==='none'?'▸ Plus de détail':'▴ Réduire';" style="background:transparent;border:1px solid var(--priB);border-radius:7px;padding:5px 12px;font-size:12px;color:var(--pri);cursor:pointer;font-family:inherit;font-weight:600;touch-action:manipulation;-webkit-tap-highlight-color:transparent">▸ Plus de détail</button><div style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--priB)"><p style="font-size:13.5px;line-height:1.75;color:var(--t2);margin-bottom:10px;text-align:justify">Il existe un biais bien documenté en psychologie électorale&nbsp;: <strong>le vote utile</strong>. Convaincu qu'un candidat ne sera pas élu, un électeur se résout à ne pas voter pour lui — et choisit à la place le «&nbsp;moins mauvais&nbsp;» parmi ceux qu'il juge capables de gagner. Ce raisonnement, répété à grande échelle, devient une <strong>prophétie auto-réalisatrice</strong>&nbsp;: le candidat ne progresse pas parce que ses sympathisants ne votent pas pour lui, et ils ne votent pas pour lui parce qu'il ne progresse pas.</p><p style="font-size:13.5px;line-height:1.75;color:var(--t2);margin-bottom:10px;text-align:justify">Voter pour le candidat qui correspond le mieux à vos valeurs, c'est envoyer un signal réel sur ce que vous attendez de la politique. Un score élevé au premier tour influence les équilibres politiques à long terme, même sans victoire immédiate.</p><p style="font-size:13.5px;line-height:1.75;color:var(--t2);margin:0;text-align:justify">Ce test vous a montré vos compatibilités. La décision vous appartient — mais elle devrait partir de vos convictions, pas de la peur du résultat.</p></div></div></div><div style="font-size:15px;font-weight:700;margin-bottom:6px;color:var(--t1)">Compatibilité par candidat</div><p class="bs" style="margin-bottom:10px">Cliquez pour voir accords, désaccords, lignes rouges et paradoxes.</p>${candsH}${skipSec}<div class="card" style="margin-top:16px;padding:15px"><div style="font-size:15px;font-weight:700;color:var(--t1);margin-bottom:12px">📚 Sources par thème</div>${srcH}</div><div style="margin-top:14px;padding:14px;background:var(--priL);border:1px solid var(--priB);border-radius:11px"><p class="bs" style="line-height:1.7;color:var(--t2)"><b>Méthodologie</b> — ${aQ.length} questions / ${thCount} thèmes. Compatibilité = 1 − |vote − position_candidat| / 4. Ligne rouge (Filtre Décisif) : élimine si signe opposé à un vote "totalement". Positions estimées sur programmes officiels 2027 (provisoires — en cours). Projet indépendant, aucune orientation d'opinion. Chaque chiffre cité dans les contextes est sourcé par une référence officielle. ⚠️ Positions candidats : simulation provisoire à 0 — non représentative. Retailleau : estimations basées sur prises de position publiques 2024-2026 (Ministre de l'Intérieur, déclarations publiques, votes au Sénat). Bardella : positions alignées sur le programme RN 2022, avec position neutre sur l'âge légal de départ à la retraite (déclarations ambiguës 2026). Glucksmann : estimations basées sur programme Place Publique/PS, déclarations publiques 2024-2026, positions au Parlement européen.</p></div><div style="margin-top:15px;display:flex;gap:10px;flex-wrap:wrap"><button class="se" onclick="sC()">${showCode?'▲ Masquer':'⚙ Algorithme'}</button><a href="https://github.com/pourlafrance/Test-de-personnalite-politique" target="_blank" class="se" style="text-decoration:none">↗ Code source</a><button class="se" onclick="gH()">↩ Recommencer</button></div>${showCode?`<div style="margin-top:14px">${codeBlock()}</div>`:''}</div>`
  +civic();
  setTimeout(()=>{document.querySelectorAll('.bf').forEach(e=>{e.style.width=e.dataset.w+'%';});},100);}
function tCand(k){const e=document.getElementById('det-'+k),a=document.getElementById('arr-'+k);if(e){e.classList.toggle('op');if(a)a.textContent=e.classList.contains('op')?'▲':'▼';}}
R();
</script>
</body>
</html>
