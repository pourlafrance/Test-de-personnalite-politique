<style>
*{box-sizing:border-box;margin:0;padding:0}

/* ─── LIGHT MODE (default) ─── */
:root{
  --bg:#f0f4fb;
  --card:#ffffff;
  --cb:#d0daea;
  --c2:#e8eef8;
  --t1:#0f1f3d;
  --t2:#1e3560;
  --t3:#4a6080;
  --t4:#8a9ab8;
  --ch:#dce8f8;
  --ct:#2a5298;
  --pb:#b8cce8;
  --pri:#2563eb;
  --pri2:#1d4ed8;
  --priL:#eff6ff;
  --priB:#bfdbfe;
  --rg:#fef2f2;
  --rt:#dc2626;
  --rb:#fecaca;
  --wg:#fffbeb;
  --wt:#92400e;
  --wb:#fcd34d;
  --gk:#16a34a;
  --gg:#f0fdf4;
  --ig:#eff6ff;
  --it:#2563eb;
  --card-shadow:0 1px 4px rgba(37,99,235,.08), 0 0 0 .5px rgba(37,99,235,.10);
  --sim:#fff9e6;--simb:#92400e;--simbd:#f59e0b;--simT:#fbbf24;
}

/* ─── DARK MODE ─── */
.dk{
  --bg:#0d1117;
  --card:#161b22;
  --cb:#21262d;
  --c2:#0d1117;
  --t1:#e6edf3;
  --t2:#cdd5df;
  --t3:#8b949e;
  --t4:#484f58;
  --ch:#1c2128;
  --ct:#79c0ff;
  --pb:#30363d;
  --pri:#3b82f6;
  --pri2:#2563eb;
  --priL:#0d2045;
  --priB:#1e3a5f;
  --rg:#2a1010;
  --rt:#f87171;
  --rb:#7f1d1d;
  --wg:#221a00;
  --wt:#fcd34d;
  --wb:#92660a;
  --gk:#4ade80;
  --gg:#031a0a;
  --ig:#0d1a35;
  --it:#79c0ff;
  --card-shadow:none;
  --sim:#1c1200;--simb:#fcd34d;--simbd:#92660a;--simT:#fbbf24;

}

html,body{background:var(--bg);min-height:100%}
#W{background:var(--bg);min-height:100vh;padding:1rem .875rem}
#A{max-width:660px;margin:0 auto}
body,button{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}

.qt{font-size:18px;font-weight:600;line-height:1.55;color:var(--t1);font-family:Georgia,serif}
.bm{font-size:14px;line-height:1.7;color:var(--t2);text-align:justify}
.bs{font-size:13px;line-height:1.6;color:var(--t3)}
.lb{font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;color:var(--t4)}

.card{
  background:var(--card);
  border:.5px solid var(--cb);
  border-radius:16px;
  padding:20px;
  margin-bottom:12px;
  box-shadow:var(--card-shadow);
}
.mc{
  display:flex;align-items:flex-start;gap:13px;padding:16px;
  border:.5px solid var(--cb);border-radius:14px;
  background:var(--card);cursor:pointer;
  transition:border-color .15s,transform .12s,box-shadow .12s;
  margin-bottom:10px;
  box-shadow:var(--card-shadow);
}

.mc.hi{border-color:var(--rb)}
.mi{
  width:44px;height:44px;border-radius:11px;
  background:var(--priL);border:.5px solid var(--priB);
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
}

/* ─── Answer buttons ─── */
.ab{
  width:100%;padding:11px 3px;border-radius:9px;
  border:1.5px solid var(--pb);background:var(--card);
  color:var(--t3);font-size:11px;text-align:center;
  cursor:pointer;line-height:1.35;transition:all .12s;
  font-family:inherit;font-weight:500;
}

.ab.sn2{border:2.5px solid var(--rt);color:var(--rt);font-weight:700;background:var(--rg)}
.ab.sn1{border:2px solid #ea580c;color:#c2410c;font-weight:600;background:#fff7ed}
.dk .ab.sn1{background:#1c0a00;color:#fb923c}
.ab.s0{border:2px solid var(--t1);color:var(--t1);font-weight:600;background:var(--ch)}
.ab.s1{border:2px solid #16a34a;color:#15803d;font-weight:600;background:var(--gg)}
.ab.s2{border:2.5px solid var(--gk);color:var(--gk);font-weight:700;background:var(--gg)}
.ab.sk{border:1.5px solid var(--pb);color:var(--t4);font-style:italic;background:var(--c2)}


/* ─── Context toggle ─── */
.db{
  display:flex;align-items:center;gap:8px;padding:10px 14px;
  border-radius:10px;border:1.5px solid var(--priB);
  background:var(--priL);cursor:pointer;font-size:13px;
  color:var(--pri);margin-bottom:12px;transition:all .12s;
  width:100%;text-align:left;font-family:inherit;font-weight:600;
}
.db:hover{background:var(--ch);border-color:var(--pri)}
.db.on{background:var(--ch);border-color:var(--pri);color:var(--t1)}
.dbox{
  padding:15px;border-radius:11px;
  background:var(--c2);border:.5px solid var(--cb);
  margin-bottom:13px;line-height:1.8;
}

/* ─── Footnotes ─── */
.fn{font-size:11px;color:var(--t4);margin-top:10px;padding-top:8px;border-top:.5px solid var(--cb);line-height:1.6}
.fn a{color:var(--it);text-decoration:none}.fn a:hover{text-decoration:underline}
sup{font-size:9px;vertical-align:super;color:var(--pri);font-weight:700}

/* ─── Progress ─── */
.pb2{height:5px;background:var(--c2);border-radius:3px;overflow:hidden}
.pf{height:100%;background:var(--pri);border-radius:3px;transition:width .4s}

/* ─── Buttons ─── */
.pr{
  padding:11px 24px;background:var(--pri);color:#fff;
  border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;
  transition:background .12s;
}
.pr:hover{background:var(--pri2)}.pr:disabled{opacity:.3;cursor:not-allowed}
.se{
  padding:8px 14px;background:var(--card);color:var(--t2);
  border:1px solid var(--cb);border-radius:9px;font-size:13px;
  cursor:pointer;font-family:inherit;transition:all .12s;
}
.se:hover{background:var(--priL);border-color:var(--priB);color:var(--pri)}
.tb{
  padding:6px 14px;border-radius:8px;
  background:var(--priL);border:1px solid var(--priB);
  color:var(--pri);font-size:12px;cursor:pointer;font-family:inherit;
  font-weight:600;transition:all .12s;
}
.tb:hover{background:var(--ch)}
.hb{
  padding:7px 14px;background:transparent;
  color:var(--t3);border:1px solid var(--cb);
  border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;
  transition:all .12s;
}
.hb:hover{color:var(--pri);border-color:var(--priB);background:var(--priL)}

/* ─── Results ─── */
.sc{background:var(--priL);border:1px solid var(--priB);border-radius:14px;padding:16px;margin-bottom:14px}
.bar{height:9px;background:var(--c2);border-radius:4px;overflow:hidden;margin-top:4px}
.bf{height:100%;border-radius:4px;width:0;transition:width 1.3s cubic-bezier(.22,1,.36,1)}
.cr{border-radius:9px;margin-bottom:6px;border:.5px solid var(--cb);overflow:hidden;background:var(--card)}
.cr.el{border-left:3px solid var(--rt)}.cr.tp{border-left:3px solid #16a34a}
.ch2{display:flex;justify-content:space-between;align-items:center;padding:11px 13px;cursor:pointer;transition:background .1s}
.ch2:hover{background:var(--c2)}.cd{display:none;padding:11px 13px;border-top:.5px solid var(--cb);background:var(--c2)}.cd.op{display:block}
.di{display:flex;gap:6px;padding:3px 0;font-size:12.5px;color:var(--t2);line-height:1.5;align-items:flex-start}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:4px}

/* ─── Chips ─── */
.ct{font-size:11px;padding:2px 9px;border-radius:8px;background:var(--priL);color:var(--pri);font-weight:600;border:.5px solid var(--priB)}
.cr2{font-size:11px;padding:2px 9px;border-radius:8px;background:var(--rg);color:var(--rt);font-weight:600;border:.5px solid var(--rb)}

/* ─── Checkbox ─── */
.cbr{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;padding:4px 0;font-size:14px;color:var(--t2)}
.cbb{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--pb);background:var(--card);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .1s}
.cbb.on{background:var(--pri);border-color:var(--pri)}.cbb.on::after{content:'✓';font-size:9px;color:#fff;font-weight:700}

/* ─── Links ─── */
.sa{color:var(--it);text-decoration:none;font-size:13px}.sa:hover{text-decoration:underline}

/* ─── Civic section ─── */
.cv{
  background:var(--card);
  border-left:4px solid var(--pri);
  border-radius:0 14px 14px 0;
  padding:18px;margin-top:18px;
  box-shadow:var(--card-shadow);
}

/* ─── Code block ─── */
.cbk{border-radius:12px;overflow:hidden}
.ck2{background:#1a2236;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.cb2{background:#0d1117;padding:16px 18px;font-family:"SFMono-Regular","Fira Code",monospace;font-size:12px;color:#9be09a;line-height:1.85;overflow-x:auto}
.cm2{color:#5a7fa0}.kw{color:#c792ea}.fn2{color:#82aaff}.nm{color:#f78c6c}

/* ─── Theme badge ─── */
.edition-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 12px;border-radius:20px;
  background:var(--priL);border:1px solid var(--priB);
  font-size:11px;font-weight:700;color:var(--pri);
  letter-spacing:.05em;text-transform:uppercase;
}

.sim-banner{
  background:var(--sim);border:2px solid var(--simbd);
  border-radius:12px;padding:14px 17px;margin-bottom:16px;
}
.sim-banner-title{font-size:14px;font-weight:700;color:var(--simb);margin-bottom:5px;display:flex;align-items:center;gap:7px}
.sim-banner p{font-size:13px;color:var(--simb);line-height:1.6;margin:0}
.sim-pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;background:var(--simbd);color:var(--sim)}

/* ─── Mobile touch fix ─── */
.ab{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
@media(hover:hover){
  .ab:hover{border-color:var(--pri);color:var(--pri);background:var(--priL)}
  .ab.sk:hover{color:var(--t3);font-style:normal;background:var(--ch);border-color:var(--t3)}
  .mc:hover{border-color:var(--pri);transform:translateY(-2px);box-shadow:0 4px 16px rgba(37,99,235,.15)}
}
@media(hover:none){
  .ab:hover{border-color:var(--pb);color:var(--t3);background:var(--card)}
  .ab.sk:hover{color:var(--t4);font-style:italic;background:var(--c2)}
  .mc:hover{border-color:var(--cb);transform:none;box-shadow:var(--card-shadow)}
}
</style>
</head>

<script>

let resModal=false;

applyDk();

function lbl(type){if(type==='pour')return dk?'<span style="font-size:11px;font-weight:700;padding:2px 9px;border-radius:6px;background:#031a0a;color:#4ade80;flex-shrink:0;margin-top:2px;white-space:nowrap">Pour</span>':'<span style="font-size:11px;font-weight:700;padding:2px 9px;border-radius:6px;background:#f0fdf4;color:#15803d;flex-shrink:0;margin-top:2px;white-space:nowrap;border:.5px solid #bbf7d0">Pour</span>';return dk?'<span style="font-size:11px;font-weight:700;padding:2px 9px;border-radius:6px;background:#0d1a35;color:#79c0ff;flex-shrink:0;margin-top:2px;white-space:nowrap">Contre</span>':'<span style="font-size:11px;font-weight:700;padding:2px 9px;border-radius:6px;background:#eff6ff;color:#1d4ed8;flex-shrink:0;margin-top:2px;white-space:nowrap;border:.5px solid #bfdbfe">Contre</span>';}

}

const TH=["💰 Économie","🌍 Immigration","🔒 Sécurité","🇪🇺 Europe","🌿 Écologie","🏥 Santé & Social","🏛️ Société","🗳️ Démocratie","⚖️ Valeurs","🌐 International","🎓 Éducation","🌾 Agriculture","💻 Numérique"];

const SR={eco:[{l:"OFCE – Sciences Po",u:"https://www.ofce.sciences-po.fr"},{l:"France Stratégie",u:"https://www.strategie.gouv.fr"}],imm:[{l:"OFPRA",u:"https://www.ofpra.gouv.fr"},{l:"Vie-publique.fr",u:"https://www.vie-publique.fr"}],sec:[{l:"IHEMI",u:"https://www.ihemi.fr"},{l:"Vie-publique.fr",u:"https://www.vie-publique.fr"}],eu:[{l:"Toute l'Europe",u:"https://www.touteleurope.eu"},{l:"Vie-publique.fr",u:"https://www.vie-publique.fr"}],ecol:[{l:"Haut Conseil pour le Climat",u:"https://www.hautconseilclimat.fr"},{l:"ADEME",u:"https://www.ademe.fr"}],soc:[{l:"DREES",u:"https://drees.solidarites-sante.gouv.fr"},{l:"Cour des Comptes",u:"https://www.ccomptes.fr"}],soc2:[{l:"CCNE",u:"https://www.ccne-ethique.fr"},{l:"Vie-publique.fr",u:"https://www.vie-publique.fr"}],dem:[{l:"CEVIPOF – Sciences Po",u:"https://www.sciencespo.fr/cevipof"},{l:"Conseil Constitutionnel",u:"https://www.conseil-constitutionnel.fr"}],val:[{l:"INSEE",u:"https://www.insee.fr"},{l:"Vie-publique.fr",u:"https://www.vie-publique.fr"}],int:[{l:"IRSEM",u:"https://www.irsem.fr"},{l:"Institut Montaigne",u:"https://www.institutmontaigne.org"}],edu:[{l:"Ministère Éducation – DEPP",u:"https://www.education.gouv.fr"},{l:"Vie-publique.fr",u:"https://www.vie-publique.fr"}],agr:[{l:"INSEE Agreste",u:"https://agreste.agriculture.gouv.fr"},{l:"INRAE",u:"https://www.inrae.fr"}],num:[{l:"CNIL",u:"https://www.cnil.fr"},{l:"Vie-publique.fr",u:"https://www.vie-publique.fr"}]};

const QD=[
["L'État doit augmenter les dépenses publiques pour améliorer les services publics, quitte à creuser davantage la dette.","La dette française s'approche des 118&nbsp;% du PIB<sup>*</sup> (près de 3&nbsp;500&nbsp;Mds€). Les dépenses publiques financent majoritairement la protection sociale (retraites, aides), la santé, le fonctionnement de l'État (salaires des fonctionnaires, des élus, administration), l'éducation et le remboursement des intérêts de cette dette.","Ses partisans estiment que l'investissement public améliore le niveau de vie, réduit les inégalités et soutient la croissance économique à long terme.","Ses opposants estiment que la maîtrise de la dette protège les générations futures, préserve la crédibilité financière de la France et laisse des marges de manœuvre en cas de crise.","eco",[["*","INSEE/Eurostat, Comptes nationaux 2025-2026 — <a href='https://www.insee.fr/fr/statistiques/serie/001558206' target='_blank'>insee.fr</a>"]]],
["L'âge légal de départ à la retraite doit être abaissé pour les carrières longues.","L'âge légal de retraite était 60&nbsp;ans jusqu'en 2010<sup>*</sup>, 62&nbsp;ans depuis, 64&nbsp;ans depuis avril&nbsp;2023<sup>**</sup>. Pénibilité, espérance de vie en bonne santé et financement du système sont au cœur du débat.","Ses partisans estiment qu'un départ plus précoce est une juste reconnaissance de la pénibilité de certains métiers et permet aux travailleurs de profiter de leur retraite en bonne santé.","Ses opposants estiment que l'allongement progressif de la durée de cotisation est nécessaire pour assurer la viabilité financière du système et son équité entre générations.","eco",[["*","Loi n°&nbsp;2010-1330 du 9&nbsp;novembre 2010 — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000023022127' target='_blank'>legifrance.gouv.fr</a>"],["**","Loi n°&nbsp;2023-270 du 14&nbsp;avril 2023 — <a href='https://www.legifrance.gouv.fr/jorf/id/JORFTEXT000047458974' target='_blank'>legifrance.gouv.fr</a>"]]],
["Le Salaire Minimum Interprofessionnel de Croissance (SMIC) doit être significativement augmenté.","Le SMIC brut s'élève à 1&nbsp;801,80&nbsp;€ au 1er janvier 2025<sup>*</sup>, soit environ 1&nbsp;426&nbsp;€ nets. Il concerne directement environ 3&nbsp;millions de travailleurs<sup>**</sup>.","Ses partisans estiment qu'une hausse significative améliore le pouvoir d'achat des ménages les plus modestes et contribue à réduire les inégalités salariales.","Ses opposants estiment qu'une hausse trop rapide peut fragiliser les secteurs à faibles marges et les très petites entreprises, avec un risque de réduction des embauches.","eco",[["*","Décret n°&nbsp;2024-1131 du 3&nbsp;décembre 2024 portant relèvement du SMIC — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000090760074' target='_blank'>legifrance.gouv.fr</a>"],["**","DARES, Les bénéficiaires du SMIC en 2024 — <a href='https://dares.travail-emploi.gouv.fr' target='_blank'>dares.travail-emploi.gouv.fr</a>"]]],
["Un Impôt sur la Fortune (ISF) doit être rétabli pour les très hauts patrimoines.","L'Impôt de Solidarité sur la Fortune (ISF) a été supprimé par la loi de finances 2018<sup>*</sup> et remplacé par l'Impôt sur la Fortune Immobilière (IFI), limité à l'immobilier. L'ISF concernait les patrimoines supérieurs à 1,3&nbsp;M€.","Ses partisans estiment que rétablir un impôt sur l'ensemble du patrimoine est un instrument de justice fiscale permettant une meilleure redistribution des richesses.","Ses opposants estiment que la suppression de cet impôt a favorisé le maintien des capitaux en France et encourage l'investissement dans les entreprises et l'économie productive.","eco",[["*","Loi n°&nbsp;2017-1837 du 30&nbsp;décembre 2017, art.&nbsp;31 — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000036339197' target='_blank'>legifrance.gouv.fr</a>"]]],
["Il faut réduire les prélèvements obligatoires pesant sur les entreprises pour favoriser la compétitivité.","Les prélèvements sur les entreprises françaises comprennent cotisations sociales patronales (retraites, maladie, chômage) et diverses taxes. Leur niveau est parmi les plus élevés de l'OCDE<sup>*</sup>.","Ses partisans estiment que réduire ces prélèvements améliore la compétitivité des entreprises françaises, allège le coût du travail et favorise les créations d'emplois.","Ses opposants estiment que ce niveau garantit le financement du modèle de protection sociale et de services publics dont bénéficient l'ensemble des salariés et des citoyens.","eco",[["*","OCDE, Taxing Wages 2022 — <a href='https://www.oecd.org/fr/publication/taxing-wages-20725124.htm' target='_blank'>oecd.org</a>"]]],
["La France doit protéger ses industries stratégiques de la concurrence internationale.","La France a perdu environ 2&nbsp;millions d'emplois industriels entre 1980 et 2015<sup>*</sup>. Le débat porte sur le rôle de l'État dans la stratégie économique nationale.","Ses partisans estiment que protéger les secteurs stratégiques préserve l'emploi national, assure une souveraineté économique et évite une dépendance excessive à l'égard de l'étranger.","Ses opposants estiment que l'ouverture à la concurrence internationale stimule l'innovation, maintient les prix à la consommation et renforce la compétitivité globale.","eco",[["*","INSEE, Comptes nationaux — Valeur ajoutée par branche — <a href='https://www.insee.fr/fr/statistiques/2015691' target='_blank'>insee.fr</a>"]]],
["L'État est trop présent dans la vie économique et doit laisser davantage de place à l'initiative privée.","La France consacre environ 57,3&nbsp;% de son PIB aux dépenses publiques en 2023<sup>*</sup>, parmi les taux les plus élevés de l'UE.","Ses partisans estiment que réduire le poids de l'État libère l'initiative individuelle, stimule l'entrepreneuriat et améliore l'efficacité économique globale.","Ses opposants estiment que l'intervention de l'État garantit l'accès universel aux services essentiels, réduit les inégalités et assure une protection collective contre les aléas du marché.","eco",[["*","Eurostat, Dépenses publiques en % du PIB 2023 — <a href='https://ec.europa.eu/eurostat/databrowser/view/gov_10a_main' target='_blank'>ec.europa.eu</a>"]]],
["Les flux migratoires vers la France doivent être fortement réduits.","La France a délivré environ 323&nbsp;000 premiers titres de séjour en 2023<sup>*</sup>, en hausse sensible depuis 2021. L'immigration est multiforme&nbsp;: travail, regroupement familial, études, protection internationale.","Ses partisans estiment qu'une politique migratoire plus sélective et mieux contrôlée permet d'assurer une intégration de meilleure qualité et d'adapter les flux aux capacités d'accueil du pays.","Ses opposants estiment que l'immigration contribue à l'économie française, compense les déficits démographiques dans certains secteurs, et que la France a des engagements humanitaires qui encadrent la gestion des flux.","imm",[["*","Ministère de l'Intérieur, Chiffres de l'immigration 2023 — <a href='https://www.immigration.interieur.gouv.fr/Info-ressources/Etudes-et-statistiques/Statistiques/Essentiel-de-l-immigration/Chiffres-cles' target='_blank'>immigration.interieur.gouv.fr</a>"]]],
["Le droit du sol doit être supprimé ou fortement restreint.","Le droit du sol permet d'obtenir la nationalité française en étant né sur le territoire français de parents étrangers. Il coexiste avec le droit du sang depuis la loi du 26&nbsp;juin&nbsp;1889<sup>*</sup>.","Ses partisans estiment que restreindre le droit du sol permet de mieux conditionner l'attribution de la nationalité à une démarche d'intégration effective et volontaire.","Ses opposants estiment que le droit du sol, inscrit dans la tradition républicaine depuis plus d'un siècle, favorise l'intégration des enfants nés sur le sol national et leur pleine appartenance à la communauté nationale.","imm",[["*","Art.&nbsp;19-3 du Code civil — <a href='https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000006419351' target='_blank'>legifrance.gouv.fr</a>"]]],
["L'intégration des personnes immigrées nécessite davantage de moyens publics.","Le taux d'emploi des personnes immigrées (56,8&nbsp;%) est inférieur d'environ 10 points à la moyenne nationale (67,5&nbsp;%) en 2020<sup>*</sup>.","Ses partisans estiment qu'investir dans l'intégration — formation linguistique, accès à l'emploi, accompagnement social — est efficace pour la cohésion nationale et bénéfique économiquement.","Ses opposants estiment que conditionner l'accueil à des critères préalables permet de mieux cibler les ressources disponibles et d'assurer une insertion plus durable.","imm",[["*","INSEE, Enquête Emploi 2020 — <a href='https://www.insee.fr/fr/statistiques/4277836' target='_blank'>insee.fr</a>"]]],
["Les peines de prison doivent être significativement alourdies pour les crimes graves.","La France compte environ 80&nbsp;000 détenus pour 62&nbsp;000 places disponibles en 2025<sup>*</sup>, un niveau record. Le taux de récidive est estimé à environ 40&nbsp;% dans les cinq ans suivant la libération<sup>**</sup>.","Ses partisans estiment que des peines plus sévères ont un effet dissuasif sur les crimes graves et répondent à l'attente de protection de la société et de justice pour les victimes.","Ses opposants estiment que renforcer les dispositifs de réinsertion — accompagnement psychologique, emploi, formation en détention — est la voie la plus efficace pour réduire durablement la récidive.","sec",[["*","Ministère de la Justice, Statistiques pénitentiaires 2025 — <a href='https://www.justice.gouv.fr/statistiques.html' target='_blank'>justice.gouv.fr</a>"],["**","Ministère de la Justice, Chiffres clés de la Justice 2024 — <a href='https://www.justice.gouv.fr/documentation/publications/les-chiffres-cles-de-la-justice' target='_blank'>justice.gouv.fr</a>"]]],
["La France doit recruter davantage de forces de l'ordre.","La France comptait environ 254&nbsp;500 policiers nationaux et gendarmes en 2021<sup>*</sup>, soit environ 3,8 agents pour 1&nbsp;000 habitants, proche de la moyenne européenne.","Ses partisans estiment que davantage de forces de l'ordre améliore la présence sur le terrain, renforce le sentiment de sécurité et permet une réponse plus rapide aux infractions.","Ses opposants estiment qu'une approche sociale et préventive — éducation, travail social, politique de la ville — est plus efficace pour réduire la délinquance à long terme.","sec",[["*","Ministère de l'Intérieur, Rapport annuel de performances 2021 — <a href='https://www.budget.gouv.fr/documentation/documents-budgetaires/exercice-2022/les-rapports-annuels-de-performances/rapport-annuel-de-performances-mission-securites' target='_blank'>budget.gouv.fr</a>"]]],
["La légalisation du cannabis à usage récréatif doit être envisagée.","Le cannabis est consommé par environ 5&nbsp;millions de Français<sup>*</sup>, faisant de la France l'un des premiers consommateurs européens par habitant. La légalisation à des fins récréatives existe au Canada, aux Pays-Bas et dans plusieurs États américains.","Ses partisans estiment que la légalisation encadrée permet de contrôler la qualité, de réduire les trafics criminels, de dégager des recettes fiscales et de traiter la consommation comme un enjeu de santé publique.","Ses opposants estiment que maintenir l'interdiction envoie un signal clair sur les risques sanitaires, notamment pour les jeunes, et évite de normaliser l'usage d'une substance psychoactive.","sec",[["*","OFDT, Baromètre santé 2021 — <a href='https://www.ofdt.fr/barometre-de-sante-publique-france-1693' target='_blank'>ofdt.fr</a>"]]],
["La France doit récupérer des compétences souveraines vis-à-vis de l'Union européenne.","Depuis le traité de Maastricht (1992)<sup>*</sup>, la France a transféré à l'UE des compétences importantes&nbsp;: politique monétaire, politique commerciale, règles budgétaires (Pacte de stabilité).","Ses partisans estiment que récupérer certaines compétences permettrait à la France de mener des politiques plus adaptées à ses besoins spécifiques et de restaurer un contrôle démocratique direct.","Ses opposants estiment que ces transferts permettent à la France de peser davantage dans les négociations mondiales et de bénéficier d'un espace économique intégré plus efficace.","eu",[["*","Traité sur l'Union européenne, signé à Maastricht le 7&nbsp;février 1992 — <a href='https://www.touteleurope.eu/fonctionnement-de-l-ue/les-traites-europeens/' target='_blank'>touteleurope.eu</a>"]]],
["L'Union européenne est globalement bénéfique pour la France.","La France est le 2e bénéficiaire net des fonds structurels européens. L'UE représente environ 60&nbsp;% du commerce extérieur français<sup>*</sup>. Les politiques européennes couvrent de nombreux domaines.","Ses partisans estiment que l'UE garantit la paix sur le continent depuis 80&nbsp;ans, crée des solidarités économiques, protège les droits des citoyens et renforce le poids de la France dans le monde.","Ses opposants estiment que certaines règles européennes, notamment en matière budgétaire et commerciale, limitent la capacité des États membres à mener des politiques souveraines.","eu",[["*","Douanes françaises, Commerce extérieur 2021 — <a href='https://www.douane.gouv.fr/actualites/le-commerce-exterieur-de-la-france-en-2021' target='_blank'>douane.gouv.fr</a>"]]],
["La transition écologique doit être une priorité absolue, même si elle implique des efforts économiques importants.","Le GIEC préconise une réduction de 43&nbsp;% des émissions mondiales d'ici 2030 (rapport AR6, 2022)<sup>*</sup>. La France s'est engagée à la neutralité carbone en 2050<sup>**</sup>.","Ses partisans estiment que faire de la transition écologique une priorité absolue est la seule voie pour éviter des catastrophes climatiques dont le coût serait bien supérieur aux investissements nécessaires.","Ses opposants estiment qu'une transition dont le rythme n'est pas adapté aux capacités économiques risque de peser disproportionnellement sur les ménages modestes et d'affaiblir la compétitivité française.","ecol",[["*","GIEC, Sixième rapport d'évaluation AR6, 2022 — <a href='https://www.ipcc.ch/report/ar6/syr/' target='_blank'>ipcc.ch</a>"],["**","Loi n°&nbsp;2019-1147 du 8&nbsp;novembre 2019 relative à l'énergie et au climat — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000039355955' target='_blank'>legifrance.gouv.fr</a>"]]],
["L'énergie nucléaire doit rester une composante importante du mix énergétique français.","La France produit entre 65 et 70&nbsp;% de son électricité par fission nucléaire selon les années<sup>*</sup>, lui conférant l'un des bilans carbone les plus bas d'Europe pour la production électrique.","Ses partisans estiment que l'énergie nucléaire garantit une électricité peu carbonée, une indépendance énergétique durable et des prix stables, constituant un atout central pour la transition climatique.","Ses opposants estiment qu'il faut accélérer la transition vers les énergies renouvelables, en raison des risques d'accident, des défis liés à la gestion des déchets radioactifs et du coût du démantèlement.","ecol",[["*","RTE, Bilan électrique 2024 — <a href='https://analysesetdonnees.rte-france.com/bilan-electrique-2024/synthese' target='_blank'>rte-france.com</a>"]]],
["Les activités très polluantes doivent être beaucoup plus fortement taxées.","La taxe carbone (contribution énergie-climat) vise à intégrer le coût environnemental dans le prix des activités polluantes. Son augmentation en 2018 a relancé un vaste débat sur la répartition des efforts entre catégories sociales.","Ses partisans estiment que taxer plus fortement les activités polluantes incite efficacement les entreprises et les ménages à modifier leurs comportements et à investir dans des alternatives moins émettrices.","Ses opposants estiment que cette forme de taxation peut pénaliser des ménages qui n'ont pas encore accès à des alternatives abordables, et qu'il faut d'abord rendre ces alternatives accessibles avant d'alourdir les charges.","ecol",[]],
["Le système de santé doit rester entièrement public, sans aucune privatisation.","La Sécurité Sociale couvre environ 79,8&nbsp;% des dépenses courantes de santé en 2020<sup>*</sup>. La France dispose d'un des systèmes de santé les plus couvrants au monde mais fait face à des tensions financières croissantes.","Ses partisans estiment que maintenir un système entièrement public garantit l'égalité d'accès aux soins pour tous les citoyens, quel que soit leur revenu, et préserve le principe de solidarité nationale.","Ses opposants estiment qu'une part de gestion privée peut améliorer l'efficacité organisationnelle du système, réduire les délais d'attente et moderniser l'offre de soins dans un contexte de contraintes budgétaires.","soc",[["*","DREES, Comptes de la santé 2021 — <a href='https://drees.solidarites-sante.gouv.fr/publications-documents-de-reference-communique-de-presse/panoramas-de-la-drees/les-depenses-de' target='_blank'>drees.solidarites-sante.gouv.fr</a>"]]],
["Les aides sociales (Revenu de Solidarité Active, allocations) doivent être conditionnées à une démarche active de retour à l'emploi.","Le Revenu de Solidarité Active (RSA) concerne environ 1,9&nbsp;million de foyers bénéficiaires en 2022<sup>*</sup>, pour un montant mensuel de 575,52&nbsp;€ pour une personne seule.","Ses partisans estiment que conditionner les aides à une démarche d'insertion active — formation, recherche d'emploi — favorise le retour vers l'emploi et accompagne les bénéficiaires dans un parcours de réinsertion.","Ses opposants estiment que les aides sociales doivent soutenir inconditionnellement les personnes en difficulté, que les obstacles au retour à l'emploi soient structurels ou non.","soc",[["*","DREES, Minima sociaux et prestations sociales 2022 — <a href='https://drees.solidarites-sante.gouv.fr/publications-documents-de-reference-communique-de-presse/panoramas-de-la-drees/minima-sociaux-et' target='_blank'>drees.solidarites-sante.gouv.fr</a>"]]],
["L'État doit construire massivement des logements sociaux pour répondre à la crise du logement.","3,1&nbsp;millions de ménages sont en attente d'un logement social au 1er janvier 2022<sup>*</sup>. Les prix immobiliers ont fortement augmenté dans les grandes métropoles.","Ses partisans estiment que construire massivement des logements sociaux est le moyen le plus direct pour l'État d'assurer un accès au logement digne pour les ménages les plus modestes.","Ses opposants estiment que simplifier les règles d'urbanisme et libérer le marché immobilier permettrait d'augmenter l'offre globale et de faire baisser les prix au bénéfice de l'ensemble des ménages.","soc",[["*","Ministère du Logement, Rapport sur les demandes de logement social 2022 — <a href='https://www.cohesion-territoires.gouv.fr/logement-social' target='_blank'>cohesion-territoires.gouv.fr</a>"]]],
["Les signes religieux ostensibles doivent être davantage limités dans l'espace public.","La loi du 9&nbsp;décembre 1905<sup>*</sup> pose le principe de séparation de l'Église et de l'État. La loi du 15&nbsp;mars 2004<sup>**</sup> interdit les signes religieux ostentatoires dans les établissements scolaires publics.","Ses partisans estiment que limiter davantage les signes religieux dans l'espace public renforce la neutralité commune et permet à chaque citoyen d'interagir dans un cadre partagé.","Ses opposants estiment que les règles actuelles offrent un équilibre satisfaisant et que les étendre davantage porterait atteinte à la liberté de conscience et d'expression religieuse garanties par la République.","soc2",[["*","Loi du 9&nbsp;décembre 1905 — <a href='https://www.legifrance.gouv.fr/loda/id/LEGITEXT000006070169' target='_blank'>legifrance.gouv.fr</a>"],["**","Loi n°&nbsp;2004-228 du 15&nbsp;mars 2004 — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000000417977' target='_blank'>legifrance.gouv.fr</a>"]]],
["Le droit au mariage doit être ouvert à tous les couples, quelle que soit leur orientation sexuelle.","Le mariage pour tous a été légalisé en France par la loi du 17&nbsp;mai&nbsp;2013<sup>*</sup>. Il a été précédé d'un vaste débat national et de mobilisations importantes des deux côtés.","Ses partisans estiment que l'égalité des droits doit s'appliquer à tous les couples sans distinction, et que le droit au mariage est un droit fondamental indépendant de l'orientation sexuelle.","Ses opposants estiment que le mariage correspond à une institution fondée sur la complémentarité des sexes et la filiation naturelle, et que d'autres formes de reconnaissance juridique pourraient répondre aux besoins des couples de même sexe.","soc2",[["*","Loi n°&nbsp;2013-404 du 17&nbsp;mai 2013 — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000027414540' target='_blank'>legifrance.gouv.fr</a>"]]],
["Les traditions culturelles établies méritent d'être préservées face aux changements sociaux rapides.","Les sociétés contemporaines connaissent des transformations rapides : modes de vie, structures familiales, repères culturels et valeurs. Ce rythme de changement fait lui-même l'objet d'un débat.","Ses partisans estiment que préserver les traditions culturelles et les repères établis assure la continuité sociale, protège les identités collectives et maintient un cadre de sens partagé entre les générations.","Ses opposants estiment que les évolutions sociales reflètent une adaptation naturelle des valeurs et que la société doit pouvoir se transformer pour mieux répondre aux besoins de ses membres.","val",[]],
["Le recours au référendum doit être généralisé pour les grandes décisions politiques nationales.","Le référendum est prévu par l'article&nbsp;11 de la Constitution<sup>*</sup>. Il a été utilisé neuf fois sous la Ve&nbsp;République, dont le dernier en 2005 sur le traité constitutionnel européen (rejeté).","Ses partisans estiment que le recours plus fréquent au référendum renforce la démocratie directe, permet aux citoyens de se prononcer directement sur les grandes orientations nationales.","Ses opposants estiment que les décisions complexes requièrent un débat approfondi confié à des représentants élus, et qu'une consultation directe peut conduire à des réponses qui ne reflètent pas pleinement la complexité des enjeux.","dem",[["*","Constitution du 4&nbsp;octobre 1958, art.&nbsp;11 — <a href='https://www.conseil-constitutionnel.fr/le-bloc-de-constitutionnalite/texte-integral-de-la-constitution-du-4-octobre-1958-en-vigueur' target='_blank'>conseil-constitutionnel.fr</a>"]]],
["Les institutions de la Ve République doivent être profondément réformées ou remplacées par une 6e République.","La Ve&nbsp;République, fondée par la Constitution du 4&nbsp;octobre 1958<sup>*</sup>, est un régime semi-présidentiel. Le Parlement peut être contourné par certains mécanismes constitutionnels (art.&nbsp;49-3, ordonnances).","Ses partisans estiment qu'une réforme profonde des institutions vers un régime plus parlementaire renforcerait la légitimité démocratique des décisions collectives.","Ses opposants estiment que la Ve&nbsp;République assure une stabilité gouvernementale nécessaire, permet l'action dans la durée et évite les crises institutionnelles qui ont caractérisé les républiques précédentes.","dem",[["*","Constitution du 4&nbsp;octobre 1958 — <a href='https://www.conseil-constitutionnel.fr/le-bloc-de-constitutionnalite/texte-integral-de-la-constitution-du-4-octobre-1958-en-vigueur' target='_blank'>conseil-constitutionnel.fr</a>"]]],
["La liberté individuelle doit primer sur les politiques collectives d'égalisation des conditions de vie.","Le débat entre liberté individuelle et égalité des conditions traverse toute la philosophie politique. Ces deux valeurs sont inscrites dans la Déclaration des droits de l'homme et du citoyen de 1789<sup>*</sup>.","Ses partisans estiment que la liberté individuelle est le moteur de la prospérité collective : laisser chacun faire ses choix et en assumer les conséquences produit les meilleurs résultats pour la société.","Ses opposants estiment que des politiques actives de redistribution sont nécessaires pour que la liberté formelle soit réelle pour tous, et pas seulement pour ceux qui disposent déjà de ressources suffisantes.","val",[["*","DDHC du 26&nbsp;août 1789, art.&nbsp;1 et 4 — <a href='https://www.conseil-constitutionnel.fr/les-textes-fondamentaux/la-declaration-des-droits-de-l-homme-et-du-citoyen-de-1789' target='_blank'>conseil-constitutionnel.fr</a>"]]],
["Les inégalités économiques constituent le problème le plus urgent à résoudre en France.","Les 10&nbsp;% des ménages les plus riches détiennent environ 47&nbsp;% du patrimoine total en France en 2021<sup>*</sup>. Les inégalités de patrimoine sont nettement plus marquées que les inégalités de revenus.","Ses partisans estiment que réduire les inégalités économiques est urgent pour des raisons de cohésion sociale, d'égalité des chances et de fonctionnement démocratique.","Ses opposants estiment que d'autres priorités — emploi, compétitivité, sécurité — méritent une attention au moins égale, et que l'amélioration du niveau de vie de tous passe d'abord par des politiques d'accès à l'emploi et à la formation.","val",[["*","INSEE, Revenus et patrimoine des ménages 2022 — <a href='https://www.insee.fr/fr/statistiques/6436313' target='_blank'>insee.fr</a>"]]],
["Un changement social profond est nécessaire et urgent en France.","Les transformations sociales sont permanentes mais leur rythme et leur ampleur sont débattus. La question porte sur l'équilibre souhaitable entre stabilité institutionnelle et changement.","Ses partisans estiment qu'un changement social profond et rapide est nécessaire pour répondre aux urgences — inégalités, crise écologique, déficit démocratique — et qu'une approche trop graduelle ne suffira pas.","Ses opposants estiment que les réformes progressives et négociées permettent une adaptation maîtrisée de la société, préservent la cohésion sociale et évitent les ruptures dont les effets sont souvent imprévisibles.","val",[]],
["La France doit augmenter significativement son budget de défense nationale.","La France a consacré environ 2,1&nbsp;% de son PIB à la défense en 2024<sup>*</sup>. La guerre en Ukraine et les tensions géopolitiques ont relancé le débat sur les capacités militaires, avec un objectif affiché d'atteindre 3&nbsp;% du PIB d'ici 2030.","Ses partisans estiment qu'augmenter le budget de la défense est nécessaire pour assurer la souveraineté nationale, honorer les engagements envers les alliés et adapter les capacités militaires.","Ses opposants estiment que les ressources publiques devraient être prioritairement orientées vers les besoins sociaux, la transition écologique et les instruments diplomatiques de prévention des conflits.","int",[["*","Ministère des Armées, Loi de programmation militaire 2024-2030 — <a href='https://www.defense.gouv.fr' target='_blank'>defense.gouv.fr</a>"]]],
["La mondialisation économique a plutôt été néfaste pour les travailleurs français.","La part de l'industrie dans l'emploi français est passée de 22&nbsp;% en 1990 à 13&nbsp;% en 2019<sup>*</sup>. Cette période a aussi coïncidé avec une baisse des prix à la consommation et le développement de nouveaux secteurs exportateurs.","Ses partisans estiment que la mondialisation a contribué aux délocalisations, à la perte d'emplois industriels dans des territoires entiers, et a affaibli le pouvoir de négociation des travailleurs.","Ses opposants estiment que l'ouverture économique mondiale a profité aux consommateurs via des prix plus bas, a créé des débouchés à l'export et a contribué au développement de nouveaux secteurs.","int",[["*","INSEE, Tableaux de l'économie française 2022 — <a href='https://www.insee.fr/fr/statistiques/2015691' target='_blank'>insee.fr</a>"]]],
["L'enseignement privé doit recevoir moins de financement public que l'enseignement public.","L'enseignement privé sous contrat accueille environ 17&nbsp;% des élèves français<sup>*</sup> et bénéficie de financements publics pour les salaires des enseignants, en contrepartie du respect des programmes nationaux.","Ses partisans estiment que réduire ces financements permettrait de concentrer davantage les ressources sur l'école publique et de renforcer son rôle d'égalisation des chances pour tous les élèves.","Ses opposants estiment que la liberté de l'enseignement est un principe reconnu par la loi Debré<sup>**</sup>, et que financer l'enseignement privé sous contrat est une contrepartie légitime.","edu",[["*","DEPP, L'état de l'École 2022 — <a href='https://www.education.gouv.fr/l-etat-de-l-ecole-2022-326538' target='_blank'>education.gouv.fr</a>"],["**","Loi n°&nbsp;59-1557 du 31&nbsp;décembre 1959 — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000000693736' target='_blank'>legifrance.gouv.fr</a>"]]],
["L'école doit davantage valoriser la discipline, l'effort et l'autorité des enseignants.","Les débats pédagogiques portent sur la manière d'enseigner, les méthodes et les finalités de l'école. Ces questions font l'objet de travaux de recherche et de positions politiques contrastées depuis des décennies.","Ses partisans estiment que valoriser davantage la discipline, l'effort et l'autorité de l'enseignant permet de mieux transmettre les savoirs fondamentaux et d'établir un cadre structurant.","Ses opposants estiment que les approches fondées sur l'épanouissement personnel, l'autonomie et les compétences transversales permettent aux élèves de développer leur esprit critique et de mieux s'adapter.","edu",[]],
["Les agriculteurs français doivent être davantage protégés et soutenus financièrement par l'État.","Le revenu agricole moyen est d'environ 18&nbsp;500&nbsp;€ par an en 2021<sup>*</sup>, avec de très fortes disparités selon les filières et les régions.","Ses partisans estiment que soutenir les agriculteurs est nécessaire pour assurer la souveraineté alimentaire, maintenir un tissu rural vivant et compenser des normes de production plus contraignantes qu'à l'étranger.","Ses opposants estiment que des réformes structurelles — meilleure régulation des prix, développement des circuits courts — permettraient aux agriculteurs de dégager des revenus plus durables.","agr",[["*","INSEE Agreste, Résultats économiques de l'agriculture 2021 — <a href='https://agreste.agriculture.gouv.fr/agreste-web/disaron/Chd2207/detail/' target='_blank'>agreste.agriculture.gouv.fr</a>"]]],
["Les grandes plateformes numériques (Google, Amazon, Meta…) doivent être beaucoup plus strictement régulées.","Les grandes plateformes concentrent des parts de marché considérables. Le Digital Markets Act (DMA), adopté en 2022<sup>*</sup> et entré en application en mars 2024, encadre désormais les pratiques des plateformes dites contrôleurs d'accès. Des premières amendes ont été infligées.","Ses partisans estiment qu'une régulation beaucoup plus stricte est nécessaire pour protéger les données personnelles, combattre les monopoles, assurer une fiscalité équitable et encadrer les effets sur la démocratie.","Ses opposants estiment qu'une régulation excessive risque de freiner l'innovation et qu'des cadres réglementaires existent déjà (RGPD, DMA) et méritent d'être mieux appliqués avant d'être renforcés.","num",[["*","Règlement (UE) 2022/1925 du 14&nbsp;septembre 2022 (DMA) — <a href='https://eur-lex.europa.eu/legal-content/FR/TXT/?uri=CELEX:32022R1925' target='_blank'>eur-lex.europa.eu</a>"]]],
["La flat tax (Prélèvement Forfaitaire Unique) sur les revenus du capital doit être supprimée au profit d'une imposition progressive.","La flat tax (PFU à 30&nbsp;%) sur les revenus du capital — dividendes, plus-values, intérêts — a été instaurée par la loi de finances 2018<sup>*</sup>.","Ses partisans estiment que revenir à une imposition progressive des revenus du capital rétablit l'équité fiscale en traitant revenus du capital et du travail selon les mêmes principes.","Ses opposants estiment que le PFU a simplifié la fiscalité de l'épargne, encouragé l'investissement dans les entreprises françaises et stabilisé des capitaux en France.","eco",[["*","Art.&nbsp;28 de la loi n°&nbsp;2017-1837 du 30&nbsp;décembre 2017 — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000036339197' target='_blank'>legifrance.gouv.fr</a>"]]],
["Un revenu universel de base doit être instauré pour tous les citoyens adultes.","Des expériences de revenu universel ont été conduites en Finlande (2017-2018)<sup>*</sup>. En France, le coût est estimé entre 400 et 600&nbsp;milliards d'euros par an selon France Stratégie<sup>**</sup>.","Ses partisans estiment qu'un revenu universel de base garantirait à chacun un filet de sécurité inconditionnelle, simplifierait le système d'aides sociales et permettrait à chacun de se former, de créer ou de prendre soin de ses proches.","Ses opposants estiment qu'à ce niveau de coût, le financement imposerait une fiscalité très lourde, et que les effets réels sur l'incitation au travail et la réduction de la pauvreté restent à démontrer à grande échelle.","eco",[["*","Kela, Résultats de l'expérience finlandaise de revenu de base 2019 — <a href='https://www.kela.fi/web/en/news-archive/2019/-/asset_publisher/lN08GY2nIrZo/content/results-of-the-basic-income-experiment-small-employment-effects-better-wellbeing' target='_blank'>kela.fi</a>"],["**","France Stratégie, Le revenu universel, de l'utopie au débat, 2017 — <a href='https://www.strategie.gouv.fr/publications/revenu-universel-lutopie-au-debat' target='_blank'>strategie.gouv.fr</a>"]]],
["La semaine de travail doit être réduite à 32 heures sans perte de salaire.","La France a travaillé en moyenne 1&nbsp;490&nbsp;heures par an en 2021<sup>*</sup>, soit moins que la moyenne de l'OCDE (1&nbsp;752&nbsp;h). La durée légale du temps de travail est de 35&nbsp;heures depuis 2000<sup>**</sup>.","Ses partisans estiment que passer à 32&nbsp;heures améliorerait la qualité de vie des travailleurs, réduirait la fatigue et le stress, et permettrait de mieux partager le travail disponible.","Ses opposants estiment qu'une réduction du temps de travail sans perte de salaire représente un coût important pour les entreprises, risque de nuire à la productivité et de fragiliser certains secteurs face à la concurrence.","eco",[["*","OCDE, Employment Outlook 2022 — <a href='https://stats.oecd.org/Index.aspx?DataSetCode=ANHRS' target='_blank'>stats.oecd.org</a>"],["**","Loi n°&nbsp;2000-37 du 19&nbsp;janvier 2000 — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000000759563' target='_blank'>legifrance.gouv.fr</a>"]]],
["Les industries énergétiques et les transports doivent être renationalisés.","EDF a été renationalisé à 100&nbsp;% en 2022<sup>*</sup>, après une période de privatisation partielle depuis 2005. La question porte sur le modèle de gestion des industries de réseau (énergie, transports ferroviaires).","Ses partisans estiment que la nationalisation garantit un service universel et des tarifs accessibles, tout en soustrayant des secteurs stratégiques aux logiques de rentabilité financière à court terme.","Ses opposants estiment que la gestion privée ou mixte favorise l'efficacité opérationnelle, l'investissement et l'innovation. Ils font valoir que l'État actionnaire n'est pas nécessairement garant de meilleurs tarifs pour les usagers ni d'une gestion plus efficace que des opérateurs soumis à la concurrence.","eco",[["*","Loi n°&nbsp;2022-1158 du 16&nbsp;août 2022, art.&nbsp;11 — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000046113743' target='_blank'>legifrance.gouv.fr</a>"]]],
["Les personnes sans-papiers résidant depuis plusieurs années en France doivent pouvoir être régularisées.","Selon des estimations, entre 600&nbsp;000 et 700&nbsp;000 personnes seraient en situation irrégulière en France<sup>*</sup>. Certaines y vivent, y travaillent et y ont construit leur vie depuis de nombreuses années.","Ses partisans estiment que régulariser les personnes établies depuis longtemps reconnaît leur réalité sociale, met fin à leur précarité juridique et à leur exposition à l'exploitation.","Ses opposants estiment que la régularisation doit rester exceptionnelle pour préserver la cohérence de la politique migratoire et pourrait encourager d'autres personnes à tenter l'entrée irrégulière.","imm",[["*","Rapport du Sénat, L'immigration irrégulière, 2020 — <a href='https://www.senat.fr/rap/r19-625/r19-6251.pdf' target='_blank'>senat.fr</a>"]]],
["La politique d'asile doit être durcie avec des délais d'instruction raccourcis.","La France a instruit 122&nbsp;765 premières demandes d'asile en 2021<sup>*</sup>, pour un taux d'accord global d'environ 25&nbsp;%. Les délais d'instruction dépassaient 6&nbsp;mois en moyenne à l'OFPRA.","Ses partisans estiment que raccourcir les délais permet de statuer plus rapidement et de favoriser une intégration plus rapide des personnes dont la demande est acceptée.","Ses opposants estiment que des délais suffisants sont nécessaires pour un examen rigoureux et équitable de chaque dossier.","imm",[["*","OFPRA, Rapport d'activité 2021 — <a href='https://www.ofpra.gouv.fr/fr/l-ofpra/nos-statistiques/statistiques' target='_blank'>ofpra.gouv.fr</a>"]]],
["Des peines minimales obligatoires doivent être rétablies pour les délits en récidive.","Les peines minimales obligatoires ont existé en France entre 2007 et 2014<sup>*</sup>. Le taux de récidive est d'environ 40&nbsp;% dans les cinq ans après une libération<sup>**</sup>.","Ses partisans estiment que rétablir des peines minimales garantit une réponse pénale prévisible et ferme face à la récidive.","Ses opposants estiment que les peines minimales restreignent le pouvoir d'appréciation des magistrats, les mieux placés pour adapter la sanction à chaque situation individuelle.","sec",[["*","Loi n°&nbsp;2007-1198 ; abrogée par la loi n°&nbsp;2014-896 — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000017356245' target='_blank'>legifrance.gouv.fr</a>"],["**","Ministère de la Justice, Chiffres clés 2022 — <a href='https://www.justice.gouv.fr/documentation/publications/les-chiffres-cles-de-la-justice' target='_blank'>justice.gouv.fr</a>"]]],
["La France devrait sortir de la zone euro ou en renégocier en profondeur les règles.","L'euro a été introduit en 1999 pour onze pays. La BCE<sup>*</sup> fixe la politique monétaire pour les vingt États membres de la zone euro, excluant pour chacun la possibilité de dévaluer sa monnaie.","Ses partisans estiment que sortir de la zone euro ou en renégocier les règles permettrait à la France de retrouver des outils de politique économique adaptés à sa situation nationale.","Ses opposants estiment que l'euro garantit la stabilité monétaire, protège contre les spéculations sur la dette et confère à la France un poids dans les institutions économiques mondiales.","eu",[["*","BCE, Rapport annuel 2021 — <a href='https://www.ecb.europa.eu/pub/annual/html/ar2021~0de3ac04b9.fr.html' target='_blank'>ecb.europa.eu</a>"]]],
["Les pesticides de synthèse doivent être interdits dans l'agriculture française d'ici 2030.","Les pesticides de synthèse sont utilisés pour protéger les cultures et garantir les rendements agricoles. La France en est le 3e consommateur européen (39&nbsp;000 t de substances actives en 2019)<sup>*</sup>. Parallèlement, des études documentent leurs effets sur la biodiversité et la santé humaine.","Ses partisans estiment que l'interdiction d'ici 2030 est nécessaire pour préserver les écosystèmes, protéger la santé des agriculteurs et des riverains et engager l'agriculture dans une trajectoire durable.","Ses opposants estiment qu'une échéance aussi proche ne laisse pas assez de temps pour que des alternatives efficaces et économiquement viables soient disponibles pour toutes les cultures.","ecol",[["*","Eurostat, Statistics on the use of plant protection products 2019 — <a href='https://ec.europa.eu/eurostat/statistics-explained/index.php?title=Agri-environmental_indicator_-_consumption_of_pesticides' target='_blank'>ec.europa.eu</a>"]]],
["La vente de véhicules thermiques neufs doit être interdite avant 2035.","L'UE a acté l'interdiction de la vente de véhicules thermiques neufs à partir de 2035<sup>*</sup>. La France abrite des constructeurs majeurs (Renault, Stellantis) et une filière sous-traitante de plusieurs centaines de milliers d'emplois.","Ses partisans estiment qu'anticiper cette interdiction accélère la transition vers les véhicules électriques et place l'industrie française en position compétitive sur les marchés d'avenir.","Ses opposants estiment qu'une interdiction avant 2035 menace des emplois dans la filière automobile, et que le calendrier doit être adapté à la capacité réelle de l'industrie et des consommateurs.","ecol",[["*","Règlement (UE) 2023/851 du 19&nbsp;avril 2023 — <a href='https://eur-lex.europa.eu/legal-content/FR/TXT/?uri=CELEX:32023R0851' target='_blank'>eur-lex.europa.eu</a>"]]],
["La pratique de la chasse doit être plus strictement réglementée.","La chasse est pratiquée par environ 1,1&nbsp;million de titulaires d'un permis en France en 2020-2021<sup>*</sup>. Elle est encadrée par des dates d'ouverture, des quotas et des règles de sécurité.","Ses partisans estiment qu'une réglementation plus stricte est nécessaire pour mieux protéger la biodiversité, améliorer la coexistence avec les autres usagers de la nature et renforcer les règles de sécurité.","Ses opposants estiment que la chasse contribue à la régulation de certaines espèces, à limiter  les dégâts causés sur des cultures et/ou récoltes agricoles et que c'est une pratique culturelle et traditionnelle ancrée dans les territoires ruraux.","ecol",[["*","Fédération Nationale des Chasseurs, Bilan 2020-2021 — <a href='https://www.chasseurdefrance.com' target='_blank'>chasseurdefrance.com</a>"]]],
["L'euthanasie active doit être légalisée en France pour les malades en fin de vie.","L'euthanasie active est légale en Belgique (depuis 2002)<sup>*</sup>, aux Pays-Bas, en Espagne et au Canada. En France, la loi Claeys-Leonetti (2016)<sup>**</sup> autorise la sédation profonde mais pas l'injection létale à la demande du patient.","Ses partisans estiment que légaliser l'euthanasie active respecte l'autonomie de la personne, lui permet de choisir les conditions de sa mort dans la dignité et met fin à des souffrances que les soins palliatifs ne peuvent pas toujours soulager.","Ses opposants estiment que la vie humaine mérite d'être protégée jusqu'à son terme naturel, que les soins palliatifs méritent d'être davantage développés, et que la légalisation pourrait exposer des personnes âgées ou vulnérables à des pressions à choisir cette option pour ne pas peser sur leurs proches.","soc2",[["*","Loi belge du 28&nbsp;mai 2002 relative à l'euthanasie — <a href='https://www.ejustice.just.fgov.be/cgi_loi/change_lg.pl?language=fr&la=F&cn=2002052837&table_name=loi' target='_blank'>ejustice.just.fgov.be</a>"],["**","Loi n°&nbsp;2016-87 du 2&nbsp;février 2016 — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000031970253' target='_blank'>legifrance.gouv.fr</a>"]]],
["La prise en charge de la dépendance des personnes âgées doit être intégralement couverte par la Sécurité Sociale.","5,4&nbsp;millions de personnes âgées dépendantes sont attendues en France d'ici 2030<sup>*</sup>. Le reste à charge moyen en EHPAD est d'environ 1&nbsp;850&nbsp;€ par mois<sup>**</sup>, souvent supérieur aux pensions de retraite moyennes.","Ses partisans estiment que la prise en charge universelle par la Sécurité Sociale garantit que toute personne, quel que soit son patrimoine, puisse être accompagnée dignement dans la dépendance sans peser financièrement sur sa famille.","Ses opposants estiment qu'une couverture intégrale représenterait un coût considérable, et qu'une combinaison de solidarité familiale, d'assurance privée et d'aide publique ciblée serait plus soutenable.","soc",[["*","DREES, Projection du nombre de personnes âgées dépendantes 2021 — <a href='https://drees.solidarites-sante.gouv.fr' target='_blank'>drees.solidarites-sante.gouv.fr</a>"],["**","CNSA, Chiffres clés de l'aide à l'autonomie 2022 — <a href='https://www.cnsa.fr/documentation/cnsa_chiffres_cles_2022_web.pdf' target='_blank'>cnsa.fr</a>"]]],
["L'encadrement des loyers doit être généralisé dans toutes les grandes villes françaises.","L'encadrement des loyers a été instauré à Paris par la loi ALUR (2014)<sup>*</sup>, suspendu en 2017, puis rétabli en 2019. Il s'applique également à quelques autres villes depuis la loi ELAN (2018)<sup>**</sup>.","Ses partisans estiment que l'encadrement des loyers protège les locataires contre des hausses excessives dans les zones tendues et permet à des ménages modestes de se maintenir dans les centres urbains.","Ses opposants estiment que ce plafonnement réduit l'offre locative, favorise le développement d'un marché parallèle, et dissuade les propriétaires d'investir dans l'entretien ou la rénovation énergétique de leurs biens.","soc",[["*","Loi ALUR n°&nbsp;2014-366 du 24&nbsp;mars 2014 — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000028772256' target='_blank'>legifrance.gouv.fr</a>"],["**","Loi ELAN n°&nbsp;2018-1021 du 23&nbsp;novembre 2018 — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000037639478' target='_blank'>legifrance.gouv.fr</a>"]]],
["La Procréation Médicalement Assistée (PMA) doit être ouverte à toutes les femmes, y compris les femmes célibataires.","La PMA pour toutes les femmes a été légalisée en France par la loi de bioéthique du 2&nbsp;août&nbsp;2021<sup>*</sup>, après un long débat parlementaire entamé en 2019.","Ses partisans estiment que l'extension de la PMA à toutes les femmes est une question d'égalité des droits : le désir d'enfant ne devrait pas dépendre de l'orientation sexuelle ou de la situation familiale.","Ses opposants estiment que cette extension soulève des questions sur les droits de l'enfant à connaître ses origines, sur la place symbolique du père dans la famille, et sur les limites souhaitables à la médicalisation de la reproduction.","soc2",[["*","Loi n°&nbsp;2021-1017 du 2&nbsp;août 2021 relative à la bioéthique — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000043884384' target='_blank'>legifrance.gouv.fr</a>"]]],
["La Gestation Pour Autrui (GPA) doit rester totalement interdite en France.","La GPA est interdite en France par l'article&nbsp;16-7 du Code civil<sup>*</sup>, mais pratiquée légalement dans plusieurs pays. Depuis l'arrêt de l'assemblée plénière de la Cour de cassation (2019)<sup>**</sup>, la filiation des enfants nés par GPA à l'étranger est reconnue en France.","Ses partisans estiment que la GPA porte atteinte à la dignité de la femme en faisant de la grossesse l'objet d'un contrat, et que même encadrée, elle risque d'ouvrir la voie à des formes de marchandisation du corps humain.","Ses opposants estiment qu'une GPA encadrée, éthique et non commerciale pourrait être légalisée dans un cadre juridique protecteur, répondant à des désirs de parentalité légitimes que la société peut choisir d'accompagner.","soc2",[["*","Code civil, art.&nbsp;16-7 — <a href='https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000006419331' target='_blank'>legifrance.gouv.fr</a>"],["**","Cour de cassation, Assemblée plénière, 4&nbsp;octobre 2019, n°&nbsp;10-19.053 — <a href='https://www.courdecassation.fr/decision/5d961aa9a9e1c53e2e2d26e3' target='_blank'>courdecassation.fr</a>"]]],
["La représentation proportionnelle doit être introduite aux élections législatives.","La représentation proportionnelle attribue les sièges en proportion des votes. Le système actuel (scrutin uninominal majoritaire à deux tours) est en vigueur depuis 1958<sup>*</sup>, sauf pour les élections de 1986 où la proportionnelle a été utilisée.","Ses partisans estiment que la proportionnelle garantit une représentation plus fidèle de la diversité des opinions et réduit le phénomène de vote utile, qui conduit des électeurs à ne pas voter pour leur préférence réelle.","Ses opposants estiment que la proportionnelle intégrale conduit à des assemblées fragmentées, complique la formation de majorités stables, et peut placer de petits partis en position d'arbitres indispensables à toute coalition.","dem",[["*","Loi n°&nbsp;58-1097 du 17&nbsp;novembre 1958 — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000000701067' target='_blank'>legifrance.gouv.fr</a>"]]],
["Le nombre de mandats successifs des élus doit être limité dans le temps.","En France, le non-cumul des mandats simultanés a été instauré par la loi organique du 14&nbsp;février 2014<sup>*</sup>. Il n'existe pas de limitation du nombre de mandats successifs dans le temps pour la plupart des fonctions électives.","Ses partisans estiment que limiter le nombre de mandats successifs favorise le renouvellement des élus, ouvre la politique à de nouveaux profils et contribue à prévenir les risques de clientélisme.","Ses opposants estiment que l'expérience acquise par un élu dans la durée est un atout pour l'efficacité de son action, et que les électeurs sont souverains pour décider de le reconduire.","dem",[["*","Loi organique n°&nbsp;2014-125 du 14&nbsp;février 2014 — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000028601264' target='_blank'>legifrance.gouv.fr</a>"]]],
["La discrimination positive par quotas est un outil adapté pour corriger les inégalités structurelles.","En France, le principe d'égalité formelle devant la loi (art.&nbsp;1 de la Constitution<sup>*</sup>) interdit les distinctions fondées sur l'origine, ce qui s'oppose traditionnellement à une approche par quotas.","Ses partisans estiment que la discrimination positive par quotas est un outil pragmatique pour corriger des inégalités réelles que l'égalité formelle seule ne suffit pas à combler.","Ses opposants estiment que le principe républicain d'universalité — traiter tous les citoyens de manière identique, sans distinction d'origine — est le fondement d'une société juste.","val",[["*","Constitution du 4&nbsp;octobre 1958, art.&nbsp;1 — <a href='https://www.conseil-constitutionnel.fr/le-bloc-de-constitutionnalite/texte-integral-de-la-constitution-du-4-octobre-1958-en-vigueur' target='_blank'>conseil-constitutionnel.fr</a>"]]],
["La France doit rester dans le commandement intégré de l'Organisation du Traité de l'Atlantique Nord (OTAN).","La France a réintégré le commandement militaire intégré de l'OTAN en 2009<sup>*</sup>, après en être sortie en 1966 sous de Gaulle. L'OTAN est une alliance militaire défensive de 32&nbsp;membres.","Ses partisans estiment que rester dans le commandement intégré de l'OTAN renforce la sécurité collective, permet une mutualisation des capacités militaires et contribue à la dissuasion face aux menaces extérieures.","Ses opposants estiment que la France devrait retrouver une doctrine de défense pleinement autonome, à l'image de la politique gaulliste, lui permettant de définir ses priorités stratégiques de manière indépendante.","int",[["*","Communiqué du sommet OTAN de Strasbourg/Kehl, 4&nbsp;avril 2009 — <a href='https://www.nato.int/cps/fr/natolive/news_52837.htm' target='_blank'>nato.int</a>"]]],
["L'aide publique au développement doit être augmentée pour atteindre l'objectif fixé par l'ONU (0,7 % du RNB).","La France a consacré 0,52&nbsp;% de son RNB à l'aide publique au développement en 2021<sup>*</sup>, en dessous de l'objectif de 0,7&nbsp;% fixé par l'ONU depuis la résolution&nbsp;2626 (1970)<sup>**</sup>.","Ses partisans estiment que porter l'aide au développement à 0,7&nbsp;% du RNB est une expression de la solidarité internationale et participe à la prévention des crises — migratoires, sanitaires ou sécuritaires.","Ses opposants estiment que les ressources publiques doivent d'abord répondre aux besoins intérieurs, et que l'efficacité réelle de l'aide au développement mérite d'être évaluée avant d'en augmenter le volume.","int",[["*","OCDE, Statistiques CAD 2021 — <a href='https://www.oecd.org/fr/cad/statistiques/' target='_blank'>oecd.org</a>"],["**","Résolution 2626 (XXV) de l'Assemblée générale des Nations Unies, 24&nbsp;octobre 1970 — <a href='https://www.un.org/fr/ga/search/view_doc.asp?symbol=A/RES/2626(XXV)' target='_blank'>un.org</a>"]]],
["L'uniforme scolaire doit être rendu obligatoire dans les établissements publics français.","L'uniforme scolaire est quasi absent des établissements publics français — contrairement au Royaume-Uni ou à de nombreux pays asiatiques. Des expérimentations ont eu lieu dans quelques établissements français, sans généralisation.","Ses partisans estiment que l'uniforme réduit les inégalités vestimentaires visibles entre élèves, limite les phénomènes de discrimination ou de pression sociale liés aux tenues, et renforce le sentiment d'appartenance à la communauté scolaire.","Ses opposants estiment que l'uniforme limite la liberté d'expression des jeunes, et que les inégalités à l'école appellent des réponses pédagogiques et sociales plutôt que vestimentaires.","edu",[]],
["Un service civique obligatoire d'un an doit être instauré pour tous les jeunes Français.","Le service militaire obligatoire a été suspendu par la loi du 28&nbsp;octobre 1997<sup>*</sup>. Le Service National Universel (SNU) a été lancé en 2019 mais reste optionnel pour la grande majorité des jeunes.","Ses partisans estiment qu'un service civique obligatoire renforcerait la cohésion nationale, transmettrait des valeurs civiques communes et créerait des liens entre des personnes d'origines sociales très différentes.","Ses opposants estiment qu'un service obligatoire d'un an représenterait un coût logistique et financier considérable, retarderait l'entrée dans la vie active, et que des dispositifs volontaires peuvent atteindre des objectifs similaires à moindre coût.","edu",[["*","Loi n°&nbsp;97-1019 du 28&nbsp;octobre 1997 — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000000563041' target='_blank'>legifrance.gouv.fr</a>"]]],
["Les normes environnementales imposées aux agriculteurs français doivent être allégées pour rester compétitifs.","Les normes environnementales françaises sont souvent plus strictes que celles applicables aux producteurs de pays tiers dont les produits sont importés en France<sup>*</sup>.","Ses partisans estiment qu'alléger certaines normes permettrait de rétablir une concurrence plus équitable avec les producteurs étrangers moins contraints, réduisant les risques de faillites.","Ses opposants estiment que le maintien de normes élevées protège la santé des consommateurs et les écosystèmes, et que la réponse aux distorsions doit passer par l'élévation des normes imposées aux importations.","agr",[["*","France Stratégie, Agriculture et environnement&nbsp;: les défis de la compétitivité, 2020 — <a href='https://www.strategie.gouv.fr/publications/agriculture-environnement-defis-competitivite' target='_blank'>strategie.gouv.fr</a>"]]],
["Les déserts médicaux doivent être combattus par une obligation d'installation des médecins dans les zones sous-dotées.","Environ 6&nbsp;millions de Français vivent dans des zones considérées comme des déserts médicaux<sup>*</sup> (moins de 2,5 médecins généralistes pour 1&nbsp;000 habitants).","Ses partisans estiment qu'obliger les médecins à s'installer dans les zones sous-dotées pendant une période définie est la seule mesure suffisamment efficace pour garantir l'accès aux soins sur l'ensemble du territoire.","Ses opposants estiment que la liberté d'installation est un principe reconnu par les ordres professionnels de santé, et que des mesures incitatives — primes, allègements fiscaux — sont plus respectueuses de ce principe.","soc",[["*","CNOM, Atlas de la démographie médicale en France 2022 — <a href='https://www.conseil-national.medecin.fr/lordre-medecins/conseil-national-lordre/demographie-medicale' target='_blank'>conseil-national.medecin.fr</a>"]]],
["Les données personnelles collectées par les entreprises doivent être soumises à un droit à la portabilité et à l'effacement effectif.","Le Règlement Général sur la Protection des Données (RGPD), entré en vigueur le 25&nbsp;mai&nbsp;2018<sup>*</sup>, donne aux citoyens européens des droits sur leurs données personnelles : accès, rectification, effacement et portabilité.","Ses partisans estiment que renforcer le droit à la portabilité et à l'effacement effectif redonne aux citoyens un contrôle réel sur leurs informations personnelles et réduit la dépendance vis-à-vis des grandes plateformes.","Ses opposants estiment que les droits existants sont déjà étendus, et que leur renforcement risque d'imposer des contraintes excessives aux entreprises, y compris aux plus petites.","num",[["*","Règlement (UE) 2016/679 du 27&nbsp;avril 2016 (RGPD) — <a href='https://eur-lex.europa.eu/legal-content/FR/TXT/?uri=CELEX%3A32016R0679' target='_blank'>eur-lex.europa.eu</a>"]]],
["L'inscription du droit à l'avortement dans la Constitution (mars 2024) doit être maintenue et consolidée.","L'avortement est légal en France depuis la loi Veil du 17&nbsp;janvier&nbsp;1975<sup>*</sup>. Le droit à l'IVG a été inscrit dans la Constitution le 4&nbsp;mars&nbsp;2024<sup>**</sup>, faisant de la France le premier pays au monde à constitutionnaliser explicitement ce droit. Le débat porte désormais sur la portée et les conséquences juridiques de cette inscription.","Ses partisans estiment que cette inscription constitutionnelle protège durablement le droit à l'IVG de toute remise en cause future et envoie un signal fort sur les droits des femmes à l'échelle internationale.","Ses opposants estiment que la loi ordinaire offrait déjà une protection très solide en France et qu'aucune force politique majeure ne menaçait ce droit. Ils voient dans cette constitutionnalisation une démarche symbolique introduisant des rigidités juridiques inutiles.","soc2",[["*","Loi n°&nbsp;75-17 du 17&nbsp;janvier 1975 — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000000508208' target='_blank'>legifrance.gouv.fr</a>"],["**","Loi constitutionnelle n°&nbsp;2024-200 du 8&nbsp;mars 2024 — <a href='https://www.legifrance.gouv.fr/loda/id/JORFTEXT000049227525' target='_blank'>legifrance.gouv.fr</a>"]]]

function codeBlock(){const answered=Object.keys(ans).filter(k=>ans[k]!=='skip');const rows=CK.map(k=>{let s=0,n=0;aQ.forEach(q=>{const v=ans[q.id];if(v!==undefined&&v!=='skip'){s+=1-Math.abs(v-q.p[k])/4;n++;}});const pct=n?Math.round(s/n*100):0;const isE=mode==='filter'&&!!getElim()[k];return{k,s:s.toFixed(3),n,pct,isE};}).sort((a,b)=>b.pct-a.pct);const traceRows=rows.map(r=>{const filled=Math.round(r.pct/5);const bar=r.isE?'[ÉLIMINÉ]        ':'['+'█'.repeat(filled)+' '.repeat(20-filled)+']';const name=(CV[r.k].n.split(' ').slice(-1)[0]).padEnd(12,' ');const eq=r.n?`&Sigma;=${r.s}&thinsp;/&thinsp;${r.n}&thinsp;=&thinsp;${(r.s/r.n).toFixed(3)}&thinsp;&times;&thinsp;100`:'aucune réponse';return`<div><span style="color:${r.isE?'#f87171':'#c9d1d9'}">${name}</span><span style="color:${r.isE?'#f87171':'#9be09a'}"> ${bar} <b>${String(r.pct).padStart(3)}%</b>  </span><span style="color:#5a7fa0">// ${eq}</span></div>`;}).join('');return`<div class="cbk"><div class="ck2"><span style="font-size:12px;font-weight:700;color:#79c0ff;text-transform:uppercase;letter-spacing:.07em">⚙ Algorithme &amp; exécution</span><a href="https://github.com/pourlafrance/Test-de-personnalite-politique" target="_blank" style="padding:5px 10px;background:#1a2236;border:.5px solid #2d4a7a;border-radius:7px;color:#79c0ff;font-size:12px;text-decoration:none">↗ GitHub</a></div><div class="cb2"><div><span style="color:#c792ea">function</span> <span style="color:#82aaff">compute</span>() {</div><div>&nbsp;&nbsp;<span style="color:#c792ea">const</span> cm = {};  <span style="color:#5a7fa0">// cm = scores de compatibilité par candidat</span></div><div>&nbsp;&nbsp;CK.forEach(k =&gt; {  <span style="color:#5a7fa0">// pour chaque candidat k</span></div><div>&nbsp;&nbsp;&nbsp;&nbsp;<span style="color:#c792ea">let</span> s = <span style="color:#f78c6c">0</span>, n = <span style="color:#f78c6c">0</span>;  <span style="color:#5a7fa0">// s = somme des scores, n = nb réponses</span></div><div>&nbsp;&nbsp;&nbsp;&nbsp;aQ.forEach(q =&gt; {  <span style="color:#5a7fa0">// pour chaque question</span></div><div>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span style="color:#c792ea">const</span> v = ans[q.id];  <span style="color:#5a7fa0">// vote de l'utilisateur</span></div><div>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span style="color:#c792ea">if</span> (v !== undefined &amp;&amp; v !== <span style="color:#c3e88d">'skip'</span>) {  <span style="color:#5a7fa0">// skip exclu du calcul</span></div><div>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;s += <span style="color:#f78c6c">1</span> - Math.abs(v - q.p[k]) / <span style="color:#f78c6c">4</span>;  <span style="color:#5a7fa0">// 1 − |vote − position| / 4</span></div><div>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;n++;  <span style="color:#5a7fa0">// vote ∈ {−2, −1, 0, +1, +2} → écart max = 4</span></div><div>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;}</div><div>&nbsp;&nbsp;&nbsp;&nbsp;});</div><div>&nbsp;&nbsp;&nbsp;&nbsp;cm[k] = n ? Math.round(s / n * <span style="color:#f78c6c">100</span>) : <span style="color:#f78c6c">0</span>;  <span style="color:#5a7fa0">// moyenne → arrondi en %</span></div><div>&nbsp;&nbsp;});</div><div>&nbsp;&nbsp;<span style="color:#c792ea">return</span> cm;</div><div>}</div><div style="margin-top:10px;padding-top:8px;border-top:.5px solid #21262d"><span style="color:#5a7fa0">// Exécution &middot; Q${ci+1}/${aQ.length} &middot; ${answered.length} réponse${answered.length>1?'s':''} &middot; toutes les questions ont le même poids</span></div>${traceRows}</div></div>`;}
